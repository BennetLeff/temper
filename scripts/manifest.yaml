# Script Manifest — scripts/manifest.yaml
#
# Every script in scripts/ must have an entry.
# Format:
#   - path: <filename relative to scripts/>
#     purpose: <one-line description>
#     owner: <last modifier or responsible party>
#     last_run: <ISO date of last known invocation, or null>
#     category: keep | delete | ticket
#     disposition: for keep: ci-gate | shell-invoked | utility | active-experiment
#                  for delete: one-line reason
#                  for ticket: ticket reference (temper-xxx)
#     imports: <list of top-level import sources>
#
# Template for new scripts (copy-paste):
#   - path: your_script.py
#     purpose: "What this script does"
#     owner: your-name
#     last_run: null
#     category: ticket
#     disposition: temper-xxx
#     imports: []
#
# See docs/plans/2026-06-22-021-feat-script-triage-sunset-plan.md

