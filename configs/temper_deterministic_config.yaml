# Temper Board Deterministic Placement Configuration
# Simplified format compatible with config_loader.py

board:
  width_mm: 100.0
  height_mm: 150.0
  margin_mm: 5.0

# Zone definitions (HV, Power, Signal, MCU)
# Professional layout: HV needs most space for PTH components, MCU needs ~25mm for ESP32
# EXP-4: Reduced max_size to limit zone expansion and preserve routing channels
zones:
  - name: "HV"
    bounds_ratio: [0.0, 0.0, 0.35, 1.0]  # Left 35% (0-35mm) - large PTH components
    description: "High voltage components"
    max_size: [40.0, 150.0]  # EXP-4: Was 50, max 5mm expansion
    can_expand: ["right"]
  - name: "Power"
    bounds_ratio: [0.35, 0.0, 0.55, 1.0]  # Center-left 20% (35-55mm) - DC-DC, regulators
    description: "Power management"
    max_size: [25.0, 150.0]  # EXP-4: Was 50, max 5mm expansion
    can_expand: ["right", "left"]
  - name: "Signal"
    bounds_ratio: [0.55, 0.0, 0.75, 1.0]  # Center-right 20% (55-75mm) - sensing ICs
    description: "Signal processing"
    max_size: [25.0, 150.0]  # EXP-4: Was 50, max 5mm expansion
    can_expand: ["right", "left"]
  - name: "MCU"
    bounds_ratio: [0.75, 0.0, 1.0, 1.0]  # Right 25% (75-100mm) - ESP32 + peripherals
    description: "Microcontroller"
    max_size: [28.0, 150.0]  # EXP-4: Was 30, max 3mm expansion
    can_expand: ["left"]

# Feedback loop configuration
# EXP-4: Conservative expansion to preserve working routes
# Problem: Previous settings (threshold=5, expansion=0.5) caused +30mm zone expansion
#          which broke USB diff pair, I_SENSE, and SPI routes that were working
# Solution: Much higher threshold and lower expansion rate
feedback:
  max_iterations: 5
  violation_threshold: 50    # EXP-4: Was 5, need many violations before expanding
  expansion_per_violation: 0.1  # EXP-4: Was 0.5, 5x less expansion per violation

# Zone assignments (component ref -> zone name)
zone_assignments:
  # HV Zone
  J_AC_IN: "HV"
  Q1: "HV"
  Q2: "HV"
  D1: "HV"
  D2: "HV"
  C_DC_BUS: "HV"
  # Power Zone  
  U_15V: "Power"
  U_3V3: "Power"
  U_5V_ISO: "Power"
  # Signal Zone
  U_CT: "Signal"
  U_TEMP: "Signal"
  U_OCP: "Signal"
  # MCU Zone
  U_MCU: "MCU"

# Fixed placements for critical components
# Ensures minimal loop area for gate drive and DC bus
fixed_positions:
  U_GATE: [15.0, 75.0]
  C_BUS1: [10.0, 60.0]
  C_BUS2: [10.0, 90.0]
  # Fix AC input flow: Connector -> Diodes -> Caps (Vertical flow up)
  J_AC_IN: [15.0, 20.0]
  # D1/D2 removed to allow placer to optimize for routing channels within HV zone

# Net class assignments (net_name -> net_class)
net_classes:
  # HighVoltage nets
  AC_L: "HighVoltage"
  AC_N: "HighVoltage"
  DC_BUS+: "HighVoltage"
  DC_BUS-: "HighVoltage"
  SW_NODE: "HighVoltage"
  # Power nets (See TemperPowerTopology in core/power_topology.py)
  # +15V (5A): PLANE - highest current, requires plane connectivity
  # +5V (2A): WIDE_TRACE - medium current, can be routed as wide traces
  # +3V3 (0.5A): STANDARD_TRACE - low current MCU rail, normal traces
  # VCC_BOOT (0.1A): STANDARD_TRACE - bootstrap supply, thin traces
  "+15V": "Power"         # 5A → PLANE (In2.Cu)
  "+5V": "PowerTrace"     # 2A → WIDE_TRACE (0.4mm width)
  VCC_BOOT: "Signal"      # 0.1A → STANDARD_TRACE
  # Ground nets
  GND: "Ground"
  PGND: "Ground"
  CGND: "Ground"
  # FinePitch nets (QFN-56 MCU signal pads with 0.4mm pitch, 0.16mm gap)
  # These nets connect to adjacent pads on U_MCU and need relaxed clearance
  "+3V3": "FinePitch"      # 0.5A → STANDARD_TRACE (routed as trace, not plane)
  PWM_H: "FinePitch"       # Adjacent to PWM_L on U_MCU
  PWM_L: "FinePitch"       # Adjacent to I_SENSE on U_MCU
  I_SENSE: "FinePitch"     # Adjacent to PWM_L on U_MCU
  SPI_CLK: "FinePitch"     # Adjacent to SPI_MOSI on U_MCU
  SPI_MOSI: "FinePitch"    # Adjacent to SPI_CLK and SPI_MISO on U_MCU
  SPI_MISO: "FinePitch"    # Adjacent to SPI_MOSI and SPI_CS_TEMP on U_MCU
  SPI_CS_TEMP: "FinePitch" # Adjacent to SPI_MISO on U_MCU
  # Standard Signal nets (not on fine-pitch pads)
  GATE_H: "Signal"
  GATE_L: "Signal"
  SHUTDOWN_N: "Signal"
  TEMP_SENSE: "Signal"
  # Differential pair (USB-C connector has 0.4mm pitch, 0.1mm gap)
  USB_D+: "Differential"
  USB_D-: "Differential"

# Net class rules (class_name -> design rules)
# Each class specifies:
#   - type: ground|power|high_voltage|signal|differential|high_current
#   - connectivity: plane|copper_pour|trace|via_array|direct
#   - target_layer: Layer for plane/pour connectivity
#   - voltage_class: For HV nets (selv|low_voltage|mains_120v|mains_240v|high_voltage)
#
# Type system enforces:
#   - Ground nets MUST use plane connectivity (EMI/return path)
#   - High voltage nets MUST have IEC 60335 creepage/clearance
#   - High current (>5A) MUST use via arrays or pours
net_class_rules:
  HighVoltage:
    type: high_voltage           # ENFORCES creepage/clearance validation
    connectivity: copper_pour    # Connect via filled copper zones
    target_layer: "F.Cu"         # HV pours on top layer only
    voltage_class: mains_240v    # IEC 60335 classification
    max_current_a: 20.0          # 20A for induction coil drive
    trace_width_mm: 2.0          # Wide traces for current capacity
    clearance_mm: 6.0            # IEC 60335-1 Table 16 (mains, PD2)
    creepage_mm: 6.0             # IEC 60335-1 Table 17 (basic insulation)
    via_size_mm: 1.0
    via_drill_mm: 0.5
    via_template: "Via3x3"       # 9 vias for 20A+ layer transitions
    allow_layer_change: false    # Keep HV on single layer for safety
    description: "High voltage AC/DC nets - IEC 60335-1 compliant"
  
  Power:
    type: power                  # Power distribution rail
    connectivity: plane          # Connect via inner power plane
    target_layer: "In2.Cu"       # Inner layer 2 for power islands
    max_current_a: 2.0           # Typical for 15V/5V rails
    trace_width_mm: 0.5
    clearance_mm: 0.3
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via2x2"       # 4 vias for power delivery
    description: "Power rails - plane connected"
  
  Ground:
    type: ground                 # ENFORCES plane connectivity
    connectivity: plane          # Ground MUST use plane (not traces)
    target_layer: "In1.Cu"       # Inner layer 1 for ground plane
    max_current_a: 10.0          # Return current capacity
    trace_width_mm: 0.5          # For stub traces to vias
    clearance_mm: 0.25
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via2x2"       # 4 vias for low-impedance return path
    description: "Ground planes - provides low-impedance return path"
  
  PowerTrace:
    type: power                  # Power distribution via wide traces
    connectivity: trace          # Route as traces (NOT plane)
    target_layer: "F.Cu"         # Top layer (can change if needed)
    max_current_a: 2.0           # For +5V rail (2A continuous)
    trace_width_mm: 0.4          # IPC-2221: 2A * 0.15 + 0.1 = 0.4mm
    clearance_mm: 0.3
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via2x2"       # 4 vias for power delivery
    description: "Medium-current power rails - trace routing"
  
  Signal:
    type: signal                 # Standard signal routing
    connectivity: trace          # Route as traces (default)
    target_layer: "F.Cu"         # Start on top, can change layers
    max_current_a: 0.5
    trace_width_mm: 0.15         # Reduced from 0.25 to navigate tight gaps
    clearance_mm: 0.2
    via_size_mm: 0.6
    via_drill_mm: 0.3
    via_template: "Via1x1"       # Single via for signals
    description: "Standard signals"
  
  FinePitch:
    type: signal                 # Signal type with tighter rules
    connectivity: trace
    target_layer: "F.Cu"
    max_current_a: 0.3
    trace_width_mm: 0.127        # 5 mil traces for fine-pitch routing
    clearance_mm: 0.15           # 0.16mm actual gap on QFN-56, allow 0.15mm
    via_size_mm: 0.4             # Smaller vias for dense areas
    via_drill_mm: 0.2
    via_template: "Via1x1"       # Single via for fine-pitch
    description: "Fine-pitch IC signals (QFN-56 with 0.4mm pitch)"
  
  FinePitchPower:
    type: power                  # Power rail with fine-pitch pad clearance
    connectivity: plane          # Connect via inner power plane (like Power class)
    target_layer: "In2.Cu"       # Inner layer 2 for power islands
    max_current_a: 2.0           # Typical for 3.3V MCU rail
    trace_width_mm: 0.25         # Stub traces to vias
    clearance_mm: 0.08           # Ultra-relaxed for fine-pitch IC (QFN-56: 0.16mm gap)
    via_size_mm: 0.4             # Micro-vias for dense areas (0.2mm radius)
    via_drill_mm: 0.2
    via_template: "Via1x1"       # Single via (micro-via, not plated through)
    description: "Power rails on fine-pitch IC pads (QFN-56)"
  
  Differential:
    type: differential           # ENFORCES impedance specification
    connectivity: trace          # Coupled trace routing
    target_layer: "F.Cu"
    target_impedance: 90         # USB 2.0 differential impedance
    max_current_a: 0.1
    trace_width_mm: 0.127        # Calculated for 90Ω differential
    clearance_mm: 0.10           # USB 2.0 differential clearance
    via_size_mm: 0.5
    via_drill_mm: 0.25
    via_template: "Via1x1"       # Single via for USB (minimal discontinuity)
    description: "USB differential pair (tightly coupled)"

# Differential pairs
differential_pairs:
  - net_pos: "USB_D+"
    net_neg: "USB_D-"
    # spacing_mm = trace_width + edge_clearance = 0.127 + 0.10 = 0.227mm (center-to-center)
    # With 0.25mm grid, the closest we can get is 0.25mm (adjacent cells)
    spacing_mm: 0.25
    coupling_tolerance_mm: 0.5
    max_skew_mm: 0.5
    description: "USB 2.0 differential pair"

# Copper zones (GND/VCC planes) - used for zone-aware routing
# These supplement any copper zones found in the PCB file
copper_zones:
  - name: "GND_plane"
    net_classes: ["GND", "PGND"]
    bounds: [0.5, 0.5, 99.5, 149.5]  # Cover most of board
    layers: ["B.Cu"]  # Bottom copper layer
    description: "Ground plane on bottom layer"
  - name: "VCC_plane"
    net_classes: ["+3V3", "+5V"]
    bounds: [30.0, 0.5, 99.5, 149.5]  # Right side (excluding HV zone)
    layers: ["In1.Cu"]  # Internal layer 1
    description: "Power plane on internal layer"

# Slot generation config
# Professional rule: spacing >= max footprint dimension to prevent overlaps
# J_AC_IN connector ~15mm, Q1/Q2 IGBTs ~12mm, smallest SMD ~3mm
slot_generation:
  spacing_mm: 12.0  # Minimum to prevent PTH component overlaps
  grid_alignment: true

# Loss function configuration (for gradient optimizer - not used in deterministic pipeline)
losses:
  overlap:
    weight: 1000.0
    enabled: true
  boundary:
    weight: 100.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
