name: Firmware Performance Record

# Blueprint workflow for on-target ESP32 firmware profiling.
# Requires a self-hosted runner with ESP32-S3 hardware attached.
# Deferred until hardware runner is provisioned.
#
# When active, triggers on push to main with firmware/** path filter.

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
  workflow_dispatch:
    inputs:
      board:
        description: "ESP32 board identifier"
        required: false
        default: "esp32-s3-devkit"

jobs:
  record:
    name: Record Firmware Performance Metrics
    runs-on: [self-hosted, esp32]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Flash firmware
        run: |
          cd firmware
          idf.py build
          idf.py -p /dev/ttyUSB0 flash

      - name: Run performance test sequence
        run: |
          python tools/firmware_perf_collect.py \
            --port /dev/ttyUSB0 \
            --output firmware-metrics.json

      - name: Record metrics
        run: |
          uv run python scripts/pipeline_metrics.py record \
            --board "${{ inputs.board }}" \
            --commit "${{ github.sha }}" \
            --from-stdin < firmware-metrics.json

      - name: Commit and push metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add power_pcb_dataset/metrics/pipeline_metrics.jsonl
          if git diff --cached --quiet; then
            echo "No metrics changes to commit"; exit 0
          fi
          git commit -m "chore(metrics): record firmware perf for ${{ github.sha }}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."; sleep 5
          done
