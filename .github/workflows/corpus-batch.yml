name: Corpus Batch Validation

on:
  schedule:
    - cron: '0 4 * * 0'  # weekly Sunday 4am UTC
  workflow_dispatch:      # manual trigger

jobs:
  batch-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      XLA_PYTHON_CLIENT_MEM_FRACTION: 0.25
      JAX_PLATFORM_NAME: cpu

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Scan external corpus (refresh manifest)
        run: uv run python scripts/scan_external_corpus.py

      - name: Batch pipeline validation
        continue-on-error: true
        run: uv run python scripts/batch_pipeline_validate.py --max-boards 80

      - name: Quarantine report
        continue-on-error: true
        run: uv run python scripts/quarantine_report.py

      - name: Upload quarantine artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-${{ github.run_id }}
          path: power_pcb_dataset/quarantine/

      - name: Upload manifest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-manifest-${{ github.run_id }}
          path: benchmarks/downloads_digital_iot/manifest.yaml
