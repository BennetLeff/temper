name: Golden DSN Check

on:
  pull_request:
    paths:
      - 'packages/temper-placer/src/temper_placer/**'
      - 'power_pcb_dataset/goldens/**'
      - 'pcb/**'
  push:
    branches: [main]
    paths:
      - 'packages/temper-placer/src/temper_placer/**'
      - 'power_pcb_dataset/goldens/**'

jobs:
  golden-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        boundary: [semantic, topological, placement, routing, validation]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run golden check (${{ matrix.boundary }})
        run: |
          uv run temper-placer dsn check \
            --boundary ${{ matrix.boundary }} \
            --input pcb/temper.kicad_pcb \
            --config pcb/temper_config.yaml \
            --golden-dir power_pcb_dataset/goldens/temper
