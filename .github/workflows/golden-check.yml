name: Golden DSN Check

on:
  pull_request:
    paths:
      - 'packages/temper-placer/src/temper_placer/**'
      - 'power_pcb_dataset/goldens/**'
      - 'pcb/**'
  push:
    branches: [main]
    paths:
      - 'packages/temper-placer/src/temper_placer/**'
      - 'power_pcb_dataset/goldens/**'

jobs:
  golden-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - boundary: semantic
            board_id: temper
            board_pcb: pcb/temper.kicad_pcb
            board_golden: power_pcb_dataset/goldens/temper
          - boundary: topological
            board_id: temper
            board_pcb: pcb/temper.kicad_pcb
            board_golden: power_pcb_dataset/goldens/temper
          - boundary: placement
            board_id: temper
            board_pcb: pcb/temper.kicad_pcb
            board_golden: power_pcb_dataset/goldens/temper
          - boundary: routing
            board_id: temper
            board_pcb: pcb/temper.kicad_pcb
            board_golden: power_pcb_dataset/goldens/temper
          - boundary: validation
            board_id: temper
            board_pcb: pcb/temper.kicad_pcb
            board_golden: power_pcb_dataset/goldens/temper
          - boundary: semantic
            board_id: bitaxe_ultra
            board_pcb: power_pcb_dataset/corpus/bitaxe_ultra/bitaxeUltra.kicad_pcb
            board_golden: power_pcb_dataset/goldens/bitaxe_ultra
          - boundary: topological
            board_id: bitaxe_ultra
            board_pcb: power_pcb_dataset/corpus/bitaxe_ultra/bitaxeUltra.kicad_pcb
            board_golden: power_pcb_dataset/goldens/bitaxe_ultra
          - boundary: placement
            board_id: bitaxe_ultra
            board_pcb: power_pcb_dataset/corpus/bitaxe_ultra/bitaxeUltra.kicad_pcb
            board_golden: power_pcb_dataset/goldens/bitaxe_ultra
          - boundary: routing
            board_id: bitaxe_ultra
            board_pcb: power_pcb_dataset/corpus/bitaxe_ultra/bitaxeUltra.kicad_pcb
            board_golden: power_pcb_dataset/goldens/bitaxe_ultra
          - boundary: validation
            board_id: bitaxe_ultra
            board_pcb: power_pcb_dataset/corpus/bitaxe_ultra/bitaxeUltra.kicad_pcb
            board_golden: power_pcb_dataset/goldens/bitaxe_ultra
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run golden check (${{ matrix.board_id }} / ${{ matrix.boundary }})
        run: |
          uv run temper-placer dsn check \
            --boundary ${{ matrix.boundary }} \
            --input ${{ matrix.board_pcb }} \
            --golden-dir ${{ matrix.board_golden }}
