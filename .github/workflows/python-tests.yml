name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'deadcode-baseline.py'
      - 'scripts/vulture_gate.py'
      - 'scripts/trace_invocations.py'
      - 'scripts/check_manifest_gate.py'
      - 'scripts/check_script_sunset.py'
      - 'scripts/manifest.yaml'
      - 'scripts/invocation_graph.json'
      - '.importlinter'
      - 'import-linter-baseline.yaml'
      - 'import-linter-allowlist.yaml'
      - 'scripts/import_linter_gate.py'
      - 'docs/plans/**'
      - 'docs/traceability-registry.yaml'
      - '**/TRACEABILITY'
      - 'power_pcb_dataset/timing_baselines.yaml'
      - 'power_pcb_dataset/golden_manifest.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'deadcode-baseline.py'
      - 'scripts/vulture_gate.py'
      - 'scripts/trace_invocations.py'
      - 'scripts/check_manifest_gate.py'
      - 'scripts/check_script_sunset.py'
      - 'scripts/manifest.yaml'
      - 'scripts/invocation_graph.json'
      - '.importlinter'
      - 'import-linter-baseline.yaml'
      - 'import-linter-allowlist.yaml'
      - 'scripts/import_linter_gate.py'
      - 'docs/plans/**'
      - 'docs/traceability-registry.yaml'
      - '**/TRACEABILITY'
      - 'power_pcb_dataset/timing_baselines.yaml'
      - 'power_pcb_dataset/golden_manifest.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      XLA_PYTHON_CLIENT_MEM_FRACTION: 0.35
      JAX_PLATFORM_NAME: cpu
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: uv sync --all-packages

      - name: Build and install Rust crate
        run: |
          uv pip install maturin
          cd packages/temper-rust-router
          uv run maturin develop --release
          cd ../..

      - name: Verify Rust module loads
        run: uv run python3 -c "import temper_rust_router; print('temper_rust_router loaded OK')"
        env:
          RUST_BACKTRACE: full

      - name: Run temper-placer tests (core only for CI speed)
        working-directory: packages/temper-placer
        run: uv run pytest tests/core/ -v --tb=short -p no:cacheprovider --maxfail=10
        env:
          XLA_PYTHON_CLIENT_MEM_FRACTION: 0.25
          JAX_PLATFORM_NAME: cpu
          RUST_BACKTRACE: full
          PYTHONFAULTHANDLER: 1
      
      - name: Coverage gate (temper-placer/core)
        if: false  # disabled: JAX + coverage OOMs on CI runners
        working-directory: packages/temper-placer
        run: uv run python ../../scripts/check_coverage_gate.py --coverage-json coverage.json --allowlist ../../.coverage-allowlist

      - name: Run invariant tests (router_v6, io, deterministic, losses)
        working-directory: packages/temper-placer
        run: |
          uv run pytest tests/router_v6/ tests/io/ tests/deterministic/ tests/losses/ \
            -v --tb=short -p no:cacheprovider --maxfail=10 \
            -m "not slow"
        continue-on-error: true
        env:
          XLA_PYTHON_CLIENT_MEM_FRACTION: 0.15
          JAX_PLATFORM_NAME: cpu

      - name: Coverage gate (temper-placer invariants)
        if: false  # disabled: 109 Hypothesis tests + coverage OOMs CI runner
        working-directory: packages/temper-placer
        run: uv run python ../../scripts/check_coverage_gate.py --coverage-json coverage-invariants.json --allowlist ../../.coverage-allowlist
        continue-on-error: true
      
      - name: Run temper-workflow tests
        working-directory: packages/temper-workflow
        run: uv run pytest tests/ -v --tb=short
        continue-on-error: true  # no test files yet (exit 5); temper-N6-U8
      
      - name: Run temper-tools tests
        working-directory: packages/temper-tools
        run: uv run pytest tests/ -v --tb=short
        continue-on-error: true  # pre-existing import errors; temper-N6-U8
       
      - name: Run temper-drc tests
        working-directory: packages/temper-drc
        run: uv run pytest tests/ -v --tb=short
        continue-on-error: true  # pre-existing test issues; temper-N6-U8
      
      - name: Regenerate transition-table test and check drift
        run: |
          python3 firmware/test/gen_transition_table.py --generate
          git diff --exit-code firmware/test/test_transition_table_generated.c

      - name: Lint with ruff
        run: uv run ruff check packages/

      - name: Vulture dead-code gate
        run: uv run python scripts/vulture_gate.py

      - name: Rebuild script invocation graph
        run: uv run python scripts/trace_invocations.py

      - name: Script manifest gate
        run: uv run python scripts/check_manifest_gate.py

      - name: Script sunset check (warnings only)
        run: uv run python scripts/check_script_sunset.py
        continue-on-error: true  # sunset is informational, not blocking

      - name: Import boundary enforcement
        run: uv run python scripts/import_linter_gate.py

  closure:
    name: Pipeline Closure Test (Truth-Gated)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run closure test (truth-gated)
        run: >
          uv run python3 scripts/ci_closure_test.py
          --pcb pcb/temper.kicad_pcb
          --output closure-result.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: closure-result
          path: closure-result.json

  regression:
    name: Performance & Quality Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Run regression check (temper board only)
        run: make regression REGRESSION_BOARD=temper
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      
      - name: Run performance regression check
        run: make perf-regression
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

  loc-cap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with: { version: "latest" }
      - name: Set up Python
        run: uv python install 3.12
      - name: LOC cap gate
        run: uv run python tools/loc_cap_check.py

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Type check temper-placer
        run: uv run mypy packages/temper-placer/src --ignore-missing-imports
        continue-on-error: true  # Don't fail on type errors for now
      
      - name: Type check temper-workflow
        run: uv run mypy packages/temper-workflow/src --ignore-missing-imports
        continue-on-error: true
      
      - name: Type check temper-tools
        run: uv run mypy packages/temper-tools/src --ignore-missing-imports
        continue-on-error: true
