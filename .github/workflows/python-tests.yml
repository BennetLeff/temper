name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'deadcode-baseline.py'
      - 'scripts/vulture_gate.py'
      - 'docs/plans/**'
      - 'docs/traceability-registry.yaml'
      - '**/TRACEABILITY'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'deadcode-baseline.py'
      - 'scripts/vulture_gate.py'
      - 'docs/plans/**'
      - 'docs/traceability-registry.yaml'
      - '**/TRACEABILITY'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Run temper-placer tests (core only for CI speed)
        working-directory: packages/temper-placer
        run: uv run pytest tests/core/ -v --tb=short --cov=temper_placer.core --cov-report=json --cov-report=term
      
      - name: Coverage gate (temper-placer/core)
        working-directory: packages/temper-placer
        run: uv run python ../../scripts/check_coverage_gate.py --coverage-json coverage.json --allowlist ../../.coverage-allowlist
      
      - name: Run temper-workflow tests
        working-directory: packages/temper-workflow
        run: uv run pytest tests/ -v --tb=short
      
      - name: Run temper-tools tests
        working-directory: packages/temper-tools
        run: uv run pytest tests/ -v --tb=short
      
      - name: Run temper-drc tests
        working-directory: packages/temper-drc
        run: uv run pytest tests/ -v --tb=short
      
      - name: Regenerate transition-table test and check drift
        run: |
          python3 firmware/test/gen_transition_table.py --generate
          git diff --exit-code firmware/test/test_transition_table_generated.c

      - name: Lint with ruff
        run: uv run ruff check packages/

      - name: Vulture dead-code gate
        run: uv run python scripts/vulture_gate.py

  coverage-stage2:
    name: Stage 2 Per-Module Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      contains(github.event.head_commit.message, 'channel') ||
      contains(github.event.head_commit.message, 'Stage2') ||
      contains(github.event.head_commit.message, 'stage2') ||
      contains(github.event.head_commit.message, 'obstacle') ||
      contains(github.event.head_commit.message, 'routing_space') ||
      contains(github.event.head_commit.message, 'channel_skeleton') ||
      contains(github.event.head_commit.message, 'channel_width') ||
      contains(github.event.head_commit.message, 'occupancy') ||
      contains(github.event.head_commit.message, 'layer_capacity') ||
      contains(github.event.head_commit.message, 'routing_demand') ||
      contains(github.event.head_commit.message, 'bottleneck') ||
      contains(github.event.head_commit.message, 'decompose-stage2')

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Coverage - obstacle_map
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_obstacle_map.py tests/router_v6/test_obstacle_map_pbt.py --cov=temper_placer.router_v6.obstacle_map --cov-fail-under=90 -q

      - name: Coverage - routing_space
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_routing_space.py tests/router_v6/test_routing_space_pbt.py --cov=temper_placer.router_v6.routing_space --cov-fail-under=90 -q

      - name: Coverage - channel_skeleton
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_channel_skeleton.py tests/router_v6/test_channel_skeleton_pbt.py --cov=temper_placer.router_v6.channel_skeleton --cov-fail-under=90 -q

      - name: Coverage - channel_widths
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_channel_widths.py tests/router_v6/test_channel_widths_pbt.py --cov=temper_placer.router_v6.channel_widths --cov-fail-under=90 -q

      - name: Coverage - occupancy_grid
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_occupancy_grid.py tests/router_v6/test_occupancy_grid_pbt.py --cov=temper_placer.router_v6.occupancy_grid --cov-fail-under=90 -q

      - name: Coverage - layer_capacity
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_layer_capacity.py tests/router_v6/test_layer_capacity_pbt.py --cov=temper_placer.router_v6.layer_capacity --cov-fail-under=90 -q

      - name: Coverage - routing_demand
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_routing_demand.py tests/router_v6/test_routing_demand_pbt.py --cov=temper_placer.router_v6.routing_demand --cov-fail-under=90 -q

      - name: Coverage - bottleneck_analysis
        working-directory: packages/temper-placer
        run: uv run pytest tests/router_v6/test_bottleneck_analysis.py tests/router_v6/test_bottleneck_analysis_pbt.py --cov=temper_placer.router_v6.bottleneck_analysis --cov-fail-under=90 -q

  regression:
    name: Performance & Quality Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Run regression check
        run: make regression
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      
      - name: Run performance regression check
        run: make perf-regression
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

  loc-cap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with: { version: "latest" }
      - name: Set up Python
        run: uv python install 3.12
      - name: LOC cap gate
        run: uv run python tools/loc_cap_check.py

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Type check temper-placer
        run: uv run mypy packages/temper-placer/src --ignore-missing-imports
        continue-on-error: true  # Don't fail on type errors for now
      
      - name: Type check temper-workflow
        run: uv run mypy packages/temper-workflow/src --ignore-missing-imports
        continue-on-error: true
      
      - name: Type check temper-tools
        run: uv run mypy packages/temper-tools/src --ignore-missing-imports
        continue-on-error: true
