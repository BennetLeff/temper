name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'firmware/**'
      - 'tools/loc_cap_check.py'
      - '.loc-allowlist.txt'
      - '.gitignore'
      - '*.py'
      - '*.kicad_pcb'
      - '*.kicad_pro'
      - '*-drc.json'
      - '*.stats'
      - '.git-blame-ignore-revs'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
      - 'firmware/**'
      - 'tools/loc_cap_check.py'
      - '.loc-allowlist.txt'
      - '.gitignore'
      - '*.py'
      - '*.kicad_pcb'
      - '*.kicad_pro'
      - '*-drc.json'
      - '*.stats'
      - '.git-blame-ignore-revs'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Run temper-placer tests (core only for CI speed)
        working-directory: packages/temper-placer
        run: uv run pytest tests/core/ -v --tb=short
      
      - name: Run temper-workflow tests
        working-directory: packages/temper-workflow
        run: uv run pytest tests/ -v --tb=short
      
      - name: Run temper-tools tests
        working-directory: packages/temper-tools
        run: uv run pytest tests/ -v --tb=short
      
      - name: Run temper-drc tests
        working-directory: packages/temper-drc
        run: uv run pytest tests/ -v --tb=short
      
      - name: Lint with ruff
        run: uv run ruff check packages/

  regression:
    name: Performance & Quality Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Run regression check
        run: make regression
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      
      - name: Run performance regression check
        run: make perf-regression
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

  loc-cap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with: { version: "latest" }
      - name: Set up Python
        run: uv python install 3.12
      - name: LOC cap gate
        run: uv run python tools/loc_cap_check.py

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --all-packages
      
      - name: Type check temper-placer
        run: uv run mypy packages/temper-placer/src --ignore-missing-imports
        continue-on-error: true  # Don't fail on type errors for now
      
      - name: Type check temper-workflow
        run: uv run mypy packages/temper-workflow/src --ignore-missing-imports
        continue-on-error: true
      
      - name: Type check temper-tools
        run: uv run mypy packages/temper-tools/src --ignore-missing-imports
        continue-on-error: true
