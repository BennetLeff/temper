name: Metrics Trend Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      sigma_multiple:
        description: "Sigma multiples for regression threshold"
        required: false
        default: "1.0"
        type: string
      window:
        description: "Analysis window (e.g. 30d)"
        required: false
        default: "30d"
        type: string

jobs:
  trend-check:
    name: Weekly Metrics Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-packages
      - name: List boards and stages
        id: list
        run: |
          uv run python scripts/pipeline_metrics.py trend --list --json > boards.json
          cat boards.json
      - name: Run trend check
        id: trend
        run: |
          SIGMA="${{ inputs.sigma_multiple || '1.0' }}"
          WINDOW="${{ inputs.window || '30d' }}"
          DRIFT_FOUND=false
          REPORT=""
          while IFS=, read -r board stage module; do
            [ -z "$board" ] && continue
            result=$(uv run python scripts/pipeline_metrics.py trend \
              --board "$board" --stage "$stage" --module "$module" \
              --window "$WINDOW" --sigma-multiple "$SIGMA" --json 2>&1) || true
            exit_code=$?
            if [ "$exit_code" = "1" ]; then
              DRIFT_FOUND=true
              REPORT="${REPORT}\n## $module / $board / $stage\n\n\`\`\`json\n$result\n\`\`\`"
            fi
          done < <(uv run python -c "
          import json
          with open('boards.json') as f:
              data = json.load(f)
          for b in data:
              print(f\"{b['board']},{b['stage']},{b.get('module','pipeline')}\")
          ")
          echo "drift_found=$DRIFT_FOUND" >> "$GITHUB_OUTPUT"
          { echo "report<<EOF"; echo "$REPORT"; echo "EOF"; } >> "$GITHUB_OUTPUT"
      - name: Create drift issue
        if: steps.trend.outputs.drift_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Metrics drift detected across modules";
            const report = `${{ steps.trend.outputs.report }}`;
            const body = "Pipeline quality metrics have drifted beyond threshold.\n\n"
              + report + "\n\n"
              + "Use uv run python scripts/pipeline_metrics.py trend to investigate.";

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: ["metrics-drift"] });
            if (!issues.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["metrics-drift"] });
            }
