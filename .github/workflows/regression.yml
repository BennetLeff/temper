name: Regression Suite

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Install KiCad (for DRC)
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-8.0-releases
          sudo apt-get update
          sudo apt-get install -y kicad
        continue-on-error: true

      - name: Regression Suite
        run: uv run python -m temper_placer.regression.cli run-corpus --json
        continue-on-error: true  # JAX nondeterministic on CI runners; temper-N6-U8

      - name: DRC Ratchet
        run: uv run python scripts/ci_check_drc.py
        continue-on-error: true
        env:
          SKIP_DRC_IF_NO_KICAD: 'true'

      - name: Closure Test
        run: uv run python3 scripts/ci_closure_test.py --pcb pcb/temper_placed.kicad_pcb
        continue-on-error: true

      - name: Round-Trip Integrity Tests
        working-directory: packages/temper-placer
        run: uv run pytest tests/test_round_trip_integrity.py -v --tb=short -m "slow or l4_regression" --timeout=600
        continue-on-error: true
        env:
          XLA_PYTHON_CLIENT_MEM_FRACTION: 0.25
          JAX_PLATFORM_NAME: cpu

      - name: Metamorphic Oracle Tests
        working-directory: packages/temper-placer
        run: uv run pytest tests/test_metamorphic_oracles.py -v --tb=short -m "slow or property" --timeout=600
        continue-on-error: true
        env:
          XLA_PYTHON_CLIENT_MEM_FRACTION: 0.25
          JAX_PLATFORM_NAME: cpu

      - name: Quarantine Report
        run: uv run python scripts/quarantine_report.py
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Regression Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "Regression suite, DRC ratchet, closure test, round-trip integrity, metamorphic oracles, and quarantine report executed." >> $GITHUB_STEP_SUMMARY
