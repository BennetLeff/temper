name: Regression Suite

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd packages/temper-placer
          uv sync

      - name: Install KiCad (for DRC)
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-8.0-releases
          sudo apt-get update
          sudo apt-get install -y kicad
        continue-on-error: true

      - name: Regression Suite
        run: python -m temper-placer regression
        continue-on-error: false

      - name: DRC Ratchet
        run: python scripts/ci_check_drc.py
        continue-on-error: true
        env:
          SKIP_DRC_IF_NO_KICAD: 'true'

      - name: Closure Test
        run: python scripts/ci_closure_test.py --pcb pcb/temper_placed.kicad_pcb
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Regression Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "Regression suite, DRC ratchet, and closure test executed." >> $GITHUB_STEP_SUMMARY
