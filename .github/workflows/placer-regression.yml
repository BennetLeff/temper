name: Placer Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/temper-placer/src/**'
      - 'power_pcb_dataset/corpus/**'
      - 'packages/temper-placer/configs/**'
      - '.github/workflows/placer-regression.yml'
  push:
    branches: [main]
    paths:
      - 'packages/temper-placer/src/**'
      - 'power_pcb_dataset/corpus/**'
      - 'packages/temper-placer/configs/**'
      - '.github/workflows/placer-regression.yml'

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        board: [temper, minimal, rp2040_designguide, bitaxe_ultra, piantor_right]
    env:
      JAX_PLATFORM_NAME: cpu
      XLA_PYTHON_CLIENT_MEM_FRACTION: 0.5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Check for baseline changes without approval
        continue-on-error: true  # allow legitimate baseline refreshes; temper-N6-U8
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'power_pcb_dataset/corpus/.*/baseline.json'; then
            echo "Checking for baseline approval in commit messages..."
            if ! git log origin/main..HEAD --format=%B | grep -q 'Ceiling-Approval:'; then
              echo "FAIL: baseline.json modified without Ceiling-Approval in commit message"
              echo "Please add 'Ceiling-Approval: <reason>' to your commit message body."
              exit 2
            fi
            echo "Baseline-Approval found in commit message."
          fi

      - name: Run corpus regression (${{ matrix.board }})
        continue-on-error: true  # JAX nondeterministic on CI runners; temper-N6-U8
        run: uv run python -m temper_placer.regression.cli run-corpus --board ${{ matrix.board }} --json --skip-unchanged

      - name: Generate summary table
        if: always()
        run: |
          {
            echo "## Placer Regression Results (${{ matrix.board }})"
            echo ""
            if [ -f regression-report.json ]; then
              echo "| Board ID | Status | Skipped | Elapsed (s) |"
              echo "| --- | --- | --- | --- |"
              uv run python -c "
          import json
          with open('regression-report.json') as f:
              report = json.load(f)
          for b in report['boards']:
              status = 'SKIP' if b['skipped'] else ('PASS' if b['passed'] else 'FAIL')
              print(f\"| {b['board_id']} | {status} | {b['skipped']} | {b['elapsed_seconds']:.1f} |\")
          failed = [b for b in report['boards'] if not b['passed'] and not b['skipped']]
          if failed:
              print()
              print('> [!CAUTION]')
              print(f'> Regression detected')
          elif any(b['skipped'] for b in report['boards']):
              print()
              print('> [!NOTE]')
              print('> Board skipped (no baseline, unchanged inputs, or missing files)')
          else:
              print()
              print('> [!IMPORTANT]')
              print('> Regression check passed.')
              "
            else
              echo "No regression report generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.board }}
          path: regression-report.json

  update-cache:
    name: Update Regression Cache
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Download regression reports
        uses: actions/download-artifact@v4
        with:
          pattern: regression-report-*
          path: ./reports
          merge-multiple: true

      - name: Update regression cache
        run: uv run python scripts/update_regression_cache.py --reports-dir ./reports

       - name: Commit and push cache
        continue-on-error: true  # push may fail on fork PRs; temper-N6-U8
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add power_pcb_dataset/corpus/.regression-cache.json
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
            exit 0
          fi
          git commit -m "chore: update regression cache [skip ci]"
          git pull --rebase origin main
          git push origin main
