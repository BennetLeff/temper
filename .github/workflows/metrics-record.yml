name: Metrics Record

on:
  push:
    branches: [main]
    paths-ignore:
      - 'power_pcb_dataset/metrics/pipeline_metrics.jsonl'
  workflow_dispatch:

jobs:
  record:
    name: Record Pipeline Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NDJSON_FILE: /tmp/pipeline-metrics-${{ github.run_id }}.ndjson
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run closure test
        continue-on-error: true
        run: >
          uv run python3 scripts/ci_closure_test.py
          --pcb pcb/temper.kicad_pcb
          --require-all-stages
          --output closure-result.json
          || echo "CLOSURE_EXIT=$?" >> "$GITHUB_ENV"
      - name: Record pipeline metrics
        run: |
          uv run python scripts/pipeline_metrics.py record \
            --board temper --commit "${{ github.sha }}" \
            --closure-json closure-result.json \
            --metrics-file "$NDJSON_FILE"
      - name: Profile loss functions
        continue-on-error: true
        run: |
          uv run temper profile run \
            --module loss-fn --board temper \
            --commit "${{ github.sha }}" --json \
            | uv run python scripts/pipeline_metrics.py record \
              --board temper --commit "${{ github.sha }}" \
              --from-stdin --metrics-file "$NDJSON_FILE"
      - name: Profile router benchmarks
        continue-on-error: true
        run: |
          uv run temper profile run \
            --module router-bench \
            --commit "${{ github.sha }}" --json \
            | uv run python scripts/pipeline_metrics.py record \
              --board temper --commit "${{ github.sha }}" \
              --from-stdin --metrics-file "$NDJSON_FILE"
          echo "=== NDJSON contents ==="
          cat "$NDJSON_FILE"
      - name: Generate HTML report
        run: >
          python scripts/pipeline_report.py
          --metrics-file power_pcb_dataset/metrics/pipeline_metrics.jsonl
          --execution-log pipeline_execution.json
          --output pipeline_report.html
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: pipeline_report.html
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-metrics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.NDJSON_FILE }}
      - name: Auto-tighten timing baselines
        if: env.FEATURE_AUTO_BASELINE_TIGHTEN == 'true'
        continue-on-error: true
        run: |
          echo "Checking for eligible baseline tightening..."
          uv run temper timing tighten --ci \
            --n-runs "${AUTO_TIGHTEN_N:-7}" \
            --threshold "${AUTO_TIGHTEN_THRESHOLD:-0.50}"
          if git diff --quiet power_pcb_dataset/timing_baselines.yaml; then
            echo "No baselines tightened."
          else
            echo "Baselines tightened — committing directly."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add power_pcb_dataset/timing_baselines.yaml
            git commit -m "chore(timing): auto-tighten baselines for ${{ github.sha }}"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying..."; sleep 5
            done
          fi
        env:
          FEATURE_AUTO_BASELINE_TIGHTEN: ${{ vars.FEATURE_AUTO_BASELINE_TIGHTEN || 'false' }}
          AUTO_TIGHTEN_N: ${{ vars.AUTO_TIGHTEN_N || '7' }}
          AUTO_TIGHTEN_THRESHOLD: ${{ vars.AUTO_TIGHTEN_THRESHOLD || '0.50' }}
