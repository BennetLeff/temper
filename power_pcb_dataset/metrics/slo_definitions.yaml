slo_version: 1
stages:
  closure:
    - metric: wall_time_ms
      type: max
      threshold: 600000
      window: 5
      severity: warn
  placement:
    - metric: wall_time_ms
      type: max
      threshold: 120000
      window: 5
      severity: warn
  routing:
    - metric: wall_time_ms
      type: p95
      threshold: 120000
      window: 10
      severity: block
    - metric: completion_pct
      type: min
      threshold: 95.0
      window: 5
      severity: block
  drc:
    - metric: drc_errors
      type: max
      threshold: 0
      window: 3
      severity: block
