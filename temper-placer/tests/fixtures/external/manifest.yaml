# - Hacking Tools: GreatFET One v2023+
# - Secure Devices: Precursor
#
# COMPLEXITY DISTRIBUTION:
# - Small (20-60 components): 7 projects
# - Medium (50-150 components): 12 projects
# - Large (150-250 components): 4 projects
# - XLarge (250+ components): 2 projects
#
# DOMAIN COVERAGE:
# - Power Electronics: 2 projects
# - FPGA/MCU Development: 5 projects
# - RF/SDR: 2 projects
# - Industrial/Automotive: 2 projects
# - Mobile/Wearable: 2 projects
# - Development Tools: 2 projects
# - Specialized Applications: 10 projects
#
# All projects use KiCad 6+ format and should parse correctly with kiutils.
# Some projects may require custom library paths for symbols/footprints.
