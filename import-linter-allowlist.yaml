  - source: temper_placer.cli
    target: temper_placer.router_v6.diagnostics
    contract: router-v6-public-interface-only
  - source: temper_placer.cli
    target: temper_placer.router_v6.obstacle_map
    contract: router-v6-public-interface-only
  - source: temper_placer.deterministic
    target: temper_placer.router_v6.adapter
