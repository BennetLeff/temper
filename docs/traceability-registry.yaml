# Plan-ID to document-path and scope registry.
#
# Schema:
#   plans:
#     <plan-id>:
#       path: docs/plans/<plan-document>.md
#       scope:
#         - path/to/file.py
#
# The `scope` field lists files that the plan's implementation touches.
# Populated from each plan's "System-Wide Impact" section.
# Entries with scope: [] are to be populated at implementation time.

