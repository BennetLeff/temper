[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "temper-workflow"
version = "0.1.0"
description = "GPBM workflow orchestration for Temper development"
requires-python = ">=3.11"
dependencies = [
    "temper-placer",
    "pyyaml>=6.0",
    "requests>=2.28.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "ruff>=0.1.6",
    "mypy>=1.7.0",
]

[project.scripts]
temper-gather = "temper_workflow.gpbm.gather:main"
temper-plan = "temper_workflow.gpbm.plan:main"
temper-measure = "temper_workflow.gpbm.measure:main"

[tool.hatch.build.targets.wheel]
packages = ["temper_workflow"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["temper_workflow", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["temper_workflow"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
