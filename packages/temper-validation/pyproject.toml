[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "temper-validation"
version = "0.1.0"
description = "Ground truth comparison package for PCB placement validation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pytest>=8.0.0",
    "numpy>=1.26.0",
    "kiutils>=1.2.0",  # KiCad file parsing
    "jinja2>=3.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest-benchmark",
    "pytest-timeout",
]

[project.scripts]
temper-validate = "temper_validation.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["temper_validation"]

[tool.pytest.ini_options]
addopts = "-v --tb=short"
pythonpath = ["."]
testpaths = ["tests"]
