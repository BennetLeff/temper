[package]
name = "temper-viewer-core"
version = "0.1.0"
edition = "2024"
description = "Core PCB board model and coordinate transforms for the Temper WASM viewer"
license = "MIT"

[lib]
name = "temper_viewer_core"
crate-type = ["rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
glam = { version = "0.29", features = ["serde"] }

[dev-dependencies]
