[package]
name = "temper-drc-rs"
version = "0.1.0"
edition = "2024"
description = "Rust DRC engine — PCB design rule checks with geo + rstar spatial indexing"

[lib]
name = "temper_drc_rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
geo = "0.28"
rstar = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[profile.release]
panic = "unwind"

[dev-dependencies]
