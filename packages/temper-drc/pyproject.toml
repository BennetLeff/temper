[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "temper-drc"
version = "0.1.0"
description = "Composable design rule checker (DRC/ERC) for PCB designs using PCL constraints"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Temper Project", email = "temper@example.com" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Electronic Design Automation (EDA)",
]
keywords = ["pcb", "drc", "erc", "design-rules", "validation", "eda"]

dependencies = [
    "pyyaml>=6.0",
    "click>=8.1.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.6",
    "mypy>=1.7.0",
]

[project.scripts]
temper-drc = "temper_drc.cli:main"

[project.urls]
Homepage = "https://github.com/temper-project/temper"
Repository = "https://github.com/temper-project/temper"

[tool.hatch.build.targets.wheel]
packages = ["temper_drc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100
