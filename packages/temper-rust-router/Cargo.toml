[package]
name = "temper-rust-router"
version = "0.1.0"
edition = "2024"
description = "Router V6 topology stage in Rust — constraint model, SAT encoding, CDCL solving, topology extraction"

[lib]
name = "temper_rust_router"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
rustsat = { version = "0.7.5", default-features = false, features = ["fxhash"] }
rustsat-cadical = "0.7.5"
thiserror = "1"
# splr = "0.13"  -- replaced by rustsat + rustsat-cadical

[profile.release]
panic = "unwind"

[dev-dependencies]
proptest = "1"
