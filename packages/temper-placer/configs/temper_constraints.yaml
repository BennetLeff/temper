# Temper Induction Heating PCB - Placement Constraints
# 
# Power Electronics Context:
# - Half-bridge topology with IKW40N120H3 IGBTs (1200V/40A)
# - 340V DC bus from voltage doubler
# - 25kHz resonant frequency  
# - UCC21550 isolated gate driver with bootstrap
# - ESP32-S3 MCU for control

# Board geometry (from KiCad)
board:
  width_mm: 100.0
  height_mm: 150.0
  margin_mm: 3.0

# ==============================================================================
# PLACEMENT ZONES (for power stage separation)
# ==============================================================================

zones:
  # Power zone - IGBTs and DC bus (TOP)
  - name: "power_zone"
    bounds: [0, 50, 120, 160]  # Y > 50mm - includes DC bus caps
  
  # Driver zone - Gate drivers, sensing (MIDDLE)  
  - name: "driver_zone"
    bounds: [0, 30, 120, 160]  # Y 30-160mm - very generous overlap
  
  # Control zone - MCU and low-voltage (BOTTOM)
  - name: "control_zone"
    bounds: [0, 0, 120, 120]  # Y < 120mm - very generous
  
  # Interface zone - Connectors
  - name: "interface_zone"
    bounds: [0, 10, 120, 160]  # Very permissive for connectors

# ==============================================================================
# COMPONENT FUNCTIONAL GROUPS
# Based on actual Temper BOM and power electronics best practices
# ==============================================================================

groups:
  # POWER STAGE: Half-Bridge IGBTs + Freewheeling Diodes
  - name: "igbt_power_stage"
    components: ["Q1", "Q2", "D1", "D2"]
    max_spread_mm: 25.0  # Tightened for low loop inductance
    proximity:
      - pair: ["Q1", "Q2"]
        max_distance_mm: 20.0
        weight: 100.0  # CRITICAL - commutation loop inductance
      - pair: ["D1", "Q1"]
        max_distance_mm: 12.0
        weight: 40.0
      - pair: ["D2", "Q2"]
        max_distance_mm: 12.0
        weight: 40.0
      - pair: ["D1", "D2"]
        max_distance_mm: 15.0
        weight: 20.0
    zone: "power_zone"
    description: "Half-bridge IGBTs and rectifier diodes. Keep tight for low ESL."

  # GATE DRIVER: UCC21550 + Bootstrap + Gate Resistors
  - name: "gate_driver_circuit"
    components: ["U_GATE", "C_BOOT", "R_GATE_H", "R_GATE_L", "C_VCC"]
    max_spread_mm: 20.0
    proximity:
      - pair: ["C_BOOT", "U_GATE"]
        max_distance_mm: 10.0
      - pair: ["C_VCC", "U_GATE"]
        max_distance_mm: 10.0
      - pair: ["R_GATE_H", "Q1"]
        max_distance_mm: 8.0
        weight: 30.0
      - pair: ["R_GATE_L", "Q2"]
        max_distance_mm: 8.0
        weight: 30.0
      - pair: ["U_GATE", "Q1"]
        max_distance_mm: 15.0
        weight: 200.0  # CRITICAL - gate drive loop inductance
      - pair: ["U_GATE", "Q2"]
        max_distance_mm: 15.0
        weight: 200.0  # CRITICAL - gate drive loop inductance
    zone: "driver_zone"
    description: "Isolated gate driver with bootstrap. Minimize gate drive loop area."

  # DC BUS: Bulk Capacitors
  - name: "dc_bus_capacitors"
    components: ["C_BUS1", "C_BUS2"]
    max_spread_mm: 25.0
    proximity:
      - pair: ["C_BUS1", "Q1"]
        max_distance_mm: 8.0
        weight: 100.0  # CRITICAL - commutation loop ESL
      - pair: ["C_BUS2", "Q2"]
        max_distance_mm: 8.0
        weight: 100.0  # CRITICAL - commutation loop ESL
      - pair: ["C_BUS1", "C_BUS2"]
        max_distance_mm: 15.0
        weight: 30.0
    zone: "power_zone"
    description: "Voltage doubler bulk caps. Must be <10mm from IGBTs for low inductance."

  # CURRENT SENSING: CT + Burden + Filter
  - name: "current_sensing"
    components: ["U_CT", "R_BURDEN", "C_CT_FILT", "U_OPAMP_CT"]
    max_spread_mm: 15.0
    zone: "driver_zone"
    proximity:
      - pair: ["R_BURDEN", "U_CT"]
        max_distance_mm: 5.0
    description: "Current transformer sensing circuit."

  # MCU: ESP32-S3 + Decoupling
  - name: "mcu_subsystem"
    components: ["U_MCU", "C_MCU_1", "C_MCU_2", "C_MCU_3", "C_MCU_4"]
    max_spread_mm: 25.0  # Increased from 15 to allow spacing
    zone: "control_zone"
    proximity:
      - pair: ["C_MCU_1", "U_MCU"]
        max_distance_mm: 8.0  # Relaxed from 3mm to allow 2mm spacing
      - pair: ["C_MCU_2", "U_MCU"]
        max_distance_mm: 8.0
      - pair: ["C_MCU_3", "U_MCU"]
        max_distance_mm: 8.0
      - pair: ["C_MCU_4", "U_MCU"]
        max_distance_mm: 8.0
    description: "ESP32-S3 MCU with decoupling caps."

  # POWER SUPPLY: LDOs
  - name: "power_supply_ldos"
    components: ["U_LDO_3V3", "U_LDO_5V", "U_BUCK"]
    max_spread_mm: 25.0
    zone: "control_zone"
    description: "Power supply regulators."

  # RTD SENSING
  - name: "rtd_sensing"
    components: ["MAX31865"]
    max_spread_mm: 10.0
    zone: "driver_zone"
    description: "RTD temperature sensing. Near gate driver for thermal monitoring."

  # CONNECTORS
  - name: "interface_connectors"
    components: ["J_AC_IN", "J_COIL", "J_NTC"]
    max_spread_mm: 30.0
    zone: "interface_zone"
    description: "Power connectors at top-left edge. AC input and coil output."

  # DEBUG/USB CONNECTORS (control side)
  - name: "debug_connectors"
    components: ["J_USB", "J_DEBUG"]
    max_spread_mm: 20.0
    zone: "control_zone"
    description: "USB and debug at bottom for MCU access."

  # NOTE: Mounting holes removed from groups - they are in fixed_positions only

# ==============================================================================
# GROUP SEPARATION RULES
# ==============================================================================

group_separation:
  - groups: ["igbt_power_stage", "mcu_subsystem"]
    min_distance_mm: 35.0
    description: "Isolate 340V/40A switching from MCU"

  - groups: ["gate_driver_circuit", "mcu_subsystem"]
    min_distance_mm: 20.0
    description: "Gate driver switching edges create noise"

  - groups: ["dc_bus_capacitors", "mcu_subsystem"]
    min_distance_mm: 25.0
    description: "High ripple current in bus caps"

  - groups: ["power_supply_ldos", "igbt_power_stage"]
    min_distance_mm: 20.0
    description: "LDOs away from switching noise"

# ==============================================================================
# CRITICAL CURRENT LOOPS
# ==============================================================================

critical_loops:
  - name: "high_side_gate_loop"
    pins: [["U_GD", "OUTA"], ["Q1", "G"], ["Q1", "E"], ["U_GD", "VSSA"]]
    max_area_mm2: 100.0
    weight: 10.0
    description: "High-side gate drive loop"

  - name: "low_side_gate_loop"
    pins: [["U_GD", "OUTB"], ["Q2", "G"], ["Q2", "E"], ["U_GD", "VSSB"]]
    max_area_mm2: 100.0
    weight: 10.0
    description: "Low-side gate drive loop"

  - name: "power_stage_commutation"
    pins: [["C_BUS1", "1"], ["Q1", "C"], ["Q2", "E"], ["C_BUS1", "2"]]
    max_area_mm2: 400.0
    weight: 20.0
    description: "Main commutation loop (Q1-Q2-C_BUS) - most critical"

  - name: "bootstrap"
    pins: [["U_GD", "VDDA"], ["C_BOOT", "1"], ["C_BOOT", "2"], ["U_GD", "VSSA"]]
    max_area_mm2: 50.0
    weight: 5.0
    description: "High-side supply loop"

# ==============================================================================
# THERMAL CONSTRAINTS
# ==============================================================================

thermal:
  - components: ["Q1", "Q2"]
    prefer_edge: true
    min_spacing_mm: 15.0
    max_distance_from_edge_mm: 10.0
    description: "IGBTs dissipate 20-50W each"

  - components: ["D1", "D2"]
    prefer_edge: true
    min_spacing_mm: 10.0
    max_distance_from_edge_mm: 15.0
    description: "Rectifier diodes"

# ==============================================================================
# CLEARANCE AND SAFETY
# ==============================================================================

hv_clearance_mm: 10.0

# Minimum component-to-component spacing (edge-to-edge)
# Enforces physical clearance to prevent overlaps and ensure HV safety
# Added based on temper-2edy.10 analysis findings
minimum_spacing:
  # High-Voltage Component Pairs (2.0mm minimum for creepage/clearance)
  - components: ["D2", "C_BUS1"]
    min_separation_mm: 3.0  # Bridge rectifier to bus cap
    description: "D2 is 17.74mm wide - needs extra clearance"
  
  - components: ["D2", "C_BUS2"]
    min_separation_mm: 3.0  # Bridge rectifier to bus cap
    description: "Prevent overlap found in temper-2edy.10"
  
  - components: ["C_BUS1", "Q1"]
    min_separation_mm: 2.0  # Bus cap to IGBT
    description: "HV clearance for DC bus capacitor"
  
  - components: ["C_BUS2", "Q2"]
    min_separation_mm: 2.0  # Bus cap to IGBT
    description: "HV clearance for DC bus capacitor"
  
  - components: ["D2", "Q1"]
    min_separation_mm: 2.0  # Rectifier to IGBT
    description: "HV clearance"
  
  - components: ["D2", "Q2"]
    min_separation_mm: 2.0  # Rectifier to IGBT
    description: "HV clearance - violation found in temper-2edy.10"
  
  # General HV component spacing
  - components: ["Q1", "Q2"]
    min_separation_mm: 6.0  # IGBT to IGBT (thermal + electrical)
    description: "Thermal spreading + HV clearance"

nets: []  # Added to satisfy config loader requirements

net_classes:
  +340V_BUS: "HighVoltage"
  DC_BUS_RTN: "HighVoltage"
  AC_L: "HighVoltage"
  AC_N: "HighVoltage"
  "DC_BUS+": "HighVoltage"
  "DC_BUS-": "HighVoltage"
  SW_NODE: "HighVoltage"
  VCC_BOOT: "HighVoltage"
  GATE_HS: "GateDrive"
  GATE_LS: "GateDrive"
  GND: "Ground"
  +3V3: "Power"
  +15V: "Power"

net_class_rules:
  Signal:
    trace_width_mm: 0.2
    clearance_mm: 0.2
    via_size_mm: 0.6
    via_drill_mm: 0.3
    via_template: "Via1x1"
    max_current_rating: 1.0  # 1A - standard signals
    voltage_v: 3.3  # Router V5: Low voltage
    routing_strategy: "standard"
    
  HighSpeed:
    trace_width_mm: 0.15
    clearance_mm: 0.3
    via_size_mm: 0.4
    via_drill_mm: 0.2
    via_template: "Via1x1"
    max_current_rating: 0.5  # 500mA - high-speed signals
    voltage_v: 3.3  # Router V5: Low voltage
    routing_strategy: "standard"
    
  Power:
    trace_width_mm: 0.5
    clearance_mm: 0.3
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via2x2"
    max_current_rating: 3.0  # 3A - power delivery
    voltage_v: 15.0  # Router V5: +15V analog
    routing_strategy: "wide_trace"
    
  GND:
    trace_width_mm: 1.0
    clearance_mm: 0.2
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via3x3"
    max_current_rating: 5.0  # 5A - ground return
    voltage_v: 0.0  # Router V5: Ground reference
    routing_strategy: "plane_preferred"
    
  GateDrive:
    trace_width_mm: 0.4
    clearance_mm: 0.3
    via_size_mm: 0.6
    via_drill_mm: 0.3
    via_template: "Via2x2"
    max_current_rating: 2.0  # 2A - gate drive
    voltage_v: 15.0  # Router V5: Gate drive voltage
    routing_strategy: "wide_trace"
    
  HighVoltage:
    trace_width_mm: 3.0  # FIXED: Was 0.3mm (simulation value), now 3.0mm for real 40A current
    clearance_mm: 3.0     # Router V5: IEC 60950-1 clearance
    creepage_mm: 3.0      # Router V5: IEC 60950-1 creepage (was 5.0)
    via_size_mm: 0.8
    via_drill_mm: 0.4
    via_template: "Via2x2"
    max_current_rating: 40.0  # FIXED: Was 1.0A, now 40A for IGBT current
    voltage_v: 340.0  # Router V5: DC bus voltage (340V)
    routing_strategy: "standard"
    
  HighCurrent:
    trace_width_mm: 3.0
    clearance_mm: 1.0
    via_size_mm: 1.0
    via_drill_mm: 0.5
    via_template: "Via4x4"  # Router V5: Auto via arrays for >5A
    max_current_rating: 40.0  # 40A - IGBT current (was 20A)
    voltage_v: 340.0  # Router V5: DC bus voltage
    routing_strategy: "plane_required"
    description: "High current power traces (IGBTs, bus caps)"

# ==============================================================================
# AESTHETICS
# ==============================================================================

aesthetics:
  grid_size_mm: 0.5
  grid_weight: 2.0
  alignment_weight: 10.0  # Increased for clean rows/columns
  grouping_weight: 10.0
  symmetry_weight: 3.0

# Loss weight overrides for power electronics
# PowerSynth approach: Strong physics-based constraints replace hard-coded positions
loss_weights:
  # Tier 1 - CRITICAL (Feasibility & Stability)
  overlap: 200.0          # Strict no-overlap
  clearance: 100.0        # HV-LV safety clearance
  loop_area: 100.0        # Minimize switching loop induction
  boundary: 100.0         # Stay within board limits
  zone_membership: 150.0  # FORCE zone compliance (increased from 50)
  
  # Tier 2 - IMPORTANT (Electrical & Thermal Performance)
  thermal: 30.0           # Heat source edge placement (IGBTs)
  grouping: 50.0          # Virtual macro blocks
  decoupling: 30.0        # CAP-to-IC proximity
  thermal_spread: 25.0    # Force spacing between heat sources
  power_path: 40.0        # High-current optimization
  
  # Tier 3 - AESTHETIC (Manufacturing & Logic)
  wirelength: 20.0        # Reduced priority in favor of loop area
  alignment: 5.0          # Row/Column consistency
  grid: 2.0               # Grid snap preference
  ground_crossing: 30.0   # Domain isolation (safety critical)

# PowerSynth approach: Specify thermal requirements for heat sources
# Optimizer will attraction Q1/Q2 to the TOP edge for heatsink mounting
thermal:
  - components: ["Q1", "Q2"]
    prefer_edge: true
    max_distance_from_edge_mm: 5.0
    description: "IGBTs must be near TOP edge for thermal interface"
  - components: ["U_LDO_5V", "U_LDO_3V3", "U_BUCK"]
    min_separation_mm: 15.0
    description: "Spread LDOs/Buck to avoid logic hot spots"

# Fixed components (don't optimize position)
# PowerSynth approach: Only fix MECHANICAL constraints, let optimizer handle electrical/thermal
# NOTE: Connectors removed from fixed list - the optimizer will place them within boundaries
# while respecting zone constraints. This avoids pin-extent violations.
fixed_components:
  # Mounting holes - mechanical interface only
  - "MH1"
  - "MH2"
  - "MH3"
  - "MH4"
# All other components (power stage, MCU, etc.) will be placed by optimizer
# using constraint losses: GroupClusterLoss, LoopAreaLoss, DecouplingLoss, etc.

# Component proximity groups for decoupling and signal chains
# PowerSynth approach: Define virtual hierarchical blocks with tight clustering
component_groups:
  # TIER 1 - CRITICAL: Power stage as rigid macro block
  - name: power_stage
    leader: Q1  # High-side IGBT
    followers: [Q2, D1, D2, C_BUS1, C_BUS2]
    max_distance: 30.0  # Entire half-bridge clustered tightly
    weight: 100.0  # VERY HIGH - treat as single unit
  
  # TIER 1 - CRITICAL: Gate driver cluster
  - name: gate_driver
    leader: U_GATE
    followers: [C_BOOT, C_VCC, R_GATE_H, R_GATE_L]
    max_distance: 20.0  # Gate loop minimization
    weight: 80.0
  
  # TIER 2: Current sensing cluster
  - name: current_sensing
    leader: U_CT
    followers: [R_BURDEN, C_CT_FILT, U_OPAMP_CT]
    max_distance: 15.0
    weight: 50.0
  
  # TIER 2: MCU system
  - name: mcu_system
    leader: U_MCU
    followers: [C_MCU_1, C_MCU_2, C_MCU_3, C_MCU_4]
    max_distance: 20.0  # Relaxed from 12 to allow 2mm spacing
    weight: 60.0
  
  # TIER 3: Power delivery
  - name: power_rail_5v
    leader: U_LDO_5V
    followers: [U_GATE]  # Gate driver supply
    max_distance: 25.0
    weight: 30.0
  
  - name: power_rail_3v3
    leader: U_LDO_3V3
    followers: [U_MCU, MAX31865]
    max_distance: 25.0
    weight: 30.0

# Force connectors to board edges for professional layout
# PowerSynth approach: Only specify MECHANICAL positions
# All electrical/thermal components will be optimizer-placed
fixed_positions:
  # Mounting holes (corners)
  MH1: [3.5, 3.5]
  MH2: [96.5, 3.5]
  MH3: [3.5, 146.5]
  MH4: [96.5, 146.5]

  # Connectors at board edges (properly zoned)
  # NOTE: Positions are BOUNDING BOX CENTERS. Pin extents must stay within board!
  # J_AC_IN has 20mm vertical extent (pins at ±10mm from center)
  # Board height is 150mm, with 0.5mm margin, max Y for center = 150-10-0.5 = 139.5mm
  J_AC_IN: [10.0, 138.0]  # AC Input - TOP LEFT (center; top pin at Y=148mm)
  J_NTC: [20.0, 138.5]    # Temp Sensor - 2-pin header (2.54mm extent)
  J_COIL: [50.0, 143.0]   # Induction Coil - 2-pin Phoenix (3.81mm extent)
  J_USB: [50.0, 5.0]      # USB - BOTTOM CENTER (Control Zone Y<70)
  J_DEBUG: [70.0, 16.0]   # Debug - 6-pin header (12.7mm extent, center at Y=16)

# ==============================================================================
# PRIORITY-BASED PLACEMENT (Professional PCB workflow)
# ==============================================================================

placement_priority:
  # Phase 1: Power Stage (template-based, fixed positions)
  power:
    components: ["Q1", "Q2", "D1", "D2", "C_BUS1", "C_BUS2"]
    method: "template"
    template: "half_bridge_vertical"
    anchor: [75, 62]  # Center-right of power zone
  
  # Phase 2: Gate Driver (proximity-based)
  driver:
    components: ["U_GATE", "C_BOOT", "R_GATE_H", "R_GATE_L", "C_VCC"]
    method: "proximity"
    reference: "Q1"
    max_distance_mm: 20.0
  
  # Phase 3: High-Speed (zone-constrained, optimizer handles)
  high_speed:
    components: ["U_MCU", "Y1"]
    method: "optimize"
    zone: "control_zone"
  
  # Phase 4: Auto-place everything else
  auto:
    method: "optimize"

# ==============================================================================
# PRIORITY-BASED ROUTING (Power first, then high-speed)
# ==============================================================================

routing_priority:
  power:
    nets: ["+340V_BUS", "DC_BUS_RTN", "SW_NODE"]
    trace_width_mm: 2.0
    priority: 1
    
  gate_drive:
    nets: ["GATE_H", "GATE_L", "+15V", "CGND"]
    trace_width_mm: 0.5
    priority: 2
    
  high_speed:
    nets: ["SPI_*", "I2C_*", "USB_*"]
    trace_width_mm: 0.25
    priority: 3
    
  auto:
    priority: 10


# ==============================================================================
# ROUTER V5/V6 ADVANCED FEATURES
# ==============================================================================

# Differential Pairs (Router V5: Dual-front A* with serpentine)
differential_pairs:
  - name: "SPI_CLK"
    positive_net: "SPI_CLK_P"
    negative_net: "SPI_CLK_N"
    target_impedance_ohm: 100
    max_skew_mm: 0.5
    separation_mm: 0.2
    description: "SPI clock (if differential)"

# Kelvin Sensing - Star-Point Topology (Router V5: Track 4)
kelvin_sensing:
  - net_name: "I_SENSE"
    star_point_pin: "R_BURDEN.1"
    force_pins: ["U_CT.OUT"]
    sense_pins: ["U_OPAMP_CT.IN", "C_CT_FILT.1"]
    force_width_mm: 2.0
    sense_width_mm: 0.2
    description: "Current sensing with Kelvin star-point"

# Via Array Overrides (Router V5: Track 1)
# Nets listed here will use via arrays regardless of current rating
via_array_overrides:
  "+340V_BUS": "Via4x4"    # Always use 4x4 for DC bus
  "DC_BUS_RTN": "Via4x4"   # Always use 4x4 for return
  "SW_NODE": "Via3x3"      # 3x3 for switch node

# Creepage/Clearance Enforcement (Router V5: Track 2)
# IEC 60950-1 compliance - nets with voltage_v > 60V use creepage distances
hv_lv_separation:
  hv_threshold_v: 60.0     # Voltage above which HV rules apply
  lv_reference_v: 3.3      # Typical LV reference (MCU)
  creepage_mm: 3.0         # 340V → 3.3V creepage (IEC 60950-1)
  clearance_mm: 2.5        # 340V → 3.3V clearance (IEC 60950-1)

# Critical Net Routing Order
# Router should process these nets first to ensure optimal paths
critical_routing_order:
  - "+340V_BUS"     # DC bus positive
  - "DC_BUS_RTN"    # DC bus negative
  - "SW_NODE"       # Switch node (very noisy)
  - "GATE_HS"       # High-side gate
  - "GATE_LS"       # Low-side gate
  - "I_SENSE"       # Current sensing (Kelvin)
  - "GND"           # Ground plane connections
