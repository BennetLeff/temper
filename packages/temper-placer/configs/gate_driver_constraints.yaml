# Gate Driver Subsystem - Minimal Configuration
# Extracted from temper_constraints.yaml for isolated routing experiment

board:
  width_mm: 30.0
  height_mm: 30.0
  margin_mm: 2.0

# Gate driver circuit only
groups:
  - name: "gate_driver_circuit"
    components: ["U_GATE", "C_BOOT", "R_GATE_H", "R_GATE_L", "C_VCC"]
    max_spread_mm: 20.0
    proximity:
      - pair: ["C_BOOT", "U_GATE"]
        max_distance_mm: 10.0
      - pair: ["C_VCC", "U_GATE"]
        max_distance_mm: 10.0
      - pair: ["R_GATE_H", "U_GATE"]
        max_distance_mm: 8.0
        weight: 30.0
      - pair: ["R_GATE_L", "U_GATE"]
        max_distance_mm: 8.0
        weight: 30.0
    description: "Isolated gate driver with bootstrap"

# Nets
nets:
  - name: "GATE_H"
    pins:
      - component: "U_GATE"
        pin: "OUTA"
      - component: "R_GATE_H"
        pin: "1"
  
  - name: "GATE_L"
    pins:
      - component: "U_GATE"
        pin: "OUTB"
      - component: "R_GATE_L"
        pin: "1"
  
  - name: "+15V"
    pins:
      - component: "U_GATE"
        pin: "VDD"
      - component: "C_VCC"
        pin: "1"
  
  - name: "CGND"
    pins:
      - component: "U_GATE"
        pin: "GND"
      - component: "C_BOOT"
        pin: "2"
      - component: "C_VCC"
        pin: "2"
  
  - name: "VCC_BOOT"
    pins:
      - component: "U_GATE"
        pin: "VDDA"
      - component: "C_BOOT"
        pin: "1"

# Net classes
net_classes:
  GATE_H: "GateDrive"
  GATE_L: "GateDrive"
  +15V: "Power"
  CGND: "GND"
  VCC_BOOT: "Power"

net_class_rules:
  GateDrive:
    trace_width_mm: 0.4
    clearance_mm: 0.2
    via_size_mm: 0.6
    via_drill_mm: 0.3
    max_current_rating: 2.0
    voltage_v: 15.0
    
  Power:
    trace_width_mm: 0.5
    clearance_mm: 0.2
    via_size_mm: 0.8
    via_drill_mm: 0.4
    max_current_rating: 3.0
    voltage_v: 15.0
    
  GND:
    trace_width_mm: 0.6
    clearance_mm: 0.2
    via_size_mm: 0.8
    via_drill_mm: 0.4
    max_current_rating: 5.0
    voltage_v: 0.0

# Component positions (hand-placed for optimal layout)
fixed_positions:
  U_GATE: [15.0, 15.0]
  C_BOOT: [10.0, 20.0]
  C_VCC: [10.0, 10.0]
  R_GATE_H: [20.0, 20.0]
  R_GATE_L: [20.0, 10.0]

# Aesthetics
aesthetics:
  grid_size_mm: 0.5
  grid_weight: 2.0
  alignment_weight: 5.0

# Loss weights (minimal for this small board)
loss_weights:
  overlap: 200.0
  boundary: 100.0
  wirelength: 10.0
