# Net-specific layer assignments for Temper board
#
# 4-LAYER STACKUP:
#   F.Cu  (Top)    - Control/Digital signals
#   In1.Cu         - GND plane (return path reference)
#   In2.Cu         - Power plane (+15V, VCC)
#   B.Cu  (Bottom) - Power stage signals
#
# STRATEGY: Complete layer separation eliminates crossings
# - Power stage on B.Cu ONLY (near transistors, short loops)
# - Control/digital on F.Cu ONLY (away from switching noise)
# - No same-layer crossings possible!

# =============================================================================
# NET CATEGORIES
# =============================================================================
net_categories:
  # POWER: Route on B.Cu only, minimize loop area
  power:
    - GATE_L
    - GATE_H
    - SW_NODE
    - DC_BUS+
    - PGND

  # CONTROL: Route on F.Cu only
  control:
    - SPI_MOSI
    - SPI_MISO
    - SPI_CLK
    - SPI_CS_TEMP
    - PWM_L
    - PWM_H
    - VCC_BOOT
    - SHUTDOWN_N

  # ANALOG: Route on F.Cu (away from power switching)
  analog:
    - I_SENSE
    - TEMP_SENSE

  # DIFFERENTIAL: F.Cu, matched lengths
  differential:
    - USB_D+
    - USB_D-

# =============================================================================
# LAYER ASSIGNMENTS - TRUE 4-LAYER STRATEGY
# =============================================================================
# Spread signals across all 4 layers to eliminate same-layer crossings
#
# F.Cu:   SPI bus (keep together for signal integrity)
# In1.Cu: USB + analog sensing
# In2.Cu: PWM control
# B.Cu:   Power stage (GATE, SW_NODE)
#
net_layers:
  # === F.Cu: SPI CLK/CS + USB ===
  SPI_CLK: "F.Cu"
  SPI_CS_TEMP: "F.Cu"
  "USB_D+": "F.Cu"
  "USB_D-": "F.Cu"
  VCC_BOOT: "F.Cu"
  # Analog on F.Cu (away from power on B.Cu)
  I_SENSE: "F.Cu"
  TEMP_SENSE: "F.Cu"
  
  # === In1.Cu: SPI MOSI only ===
  SPI_MOSI: "In1.Cu"
  
  # === In2.Cu: SPI MISO + PWM ===
  # MISO on different layer from MOSI
  SPI_MISO: "In2.Cu"
  PWM_L: "In2.Cu"
  PWM_H: "In2.Cu"
  SHUTDOWN_N: "In2.Cu"
  
  # === B.Cu: POWER STAGE ===
  # Gate drive (short loops, no vias)
  GATE_L: "B.Cu"
  GATE_H: "B.Cu"
  # Switching node
  SW_NODE: "B.Cu"
  # DC bus
  DC_BUS+: "B.Cu"

# =============================================================================
# CROSSING RULES - Should be NONE with proper 4-layer separation
# =============================================================================
crossing_rules:
  # On 4-layer, only USB diff pair should cross itself
  accept_crossings:
    - [USB_D+, USB_D-]  # Differential pair crossing is OK
  
  # No control crossings expected - all on same layer (F.Cu)
  via_at_crossing: []

net_class_layers: {}
