# Net-specific layer assignments for Temper board
#
# STRATEGY: Categorize nets by routing requirements
# - Power nets: NO VIAS (inductance causes ringing)
# - Control nets: VIAS OK (can tolerate ~1nH)
# - Analog nets: MINIMAL VIAS (noise pickup)

# =============================================================================
# NET CATEGORIES - Determines routing behavior
# =============================================================================
net_categories:
  # POWER: No vias allowed, crossings accepted, wide traces
  # These form the gate drive and commutation loops
  power:
    - GATE_L
    - GATE_H
    - SW_NODE
    - DC_BUS+
    - PGND

  # CONTROL: Vias allowed at crossings, standard traces
  # Low dI/dt signals that can tolerate via inductance
  control:
    - SPI_MOSI
    - SPI_MISO
    - SPI_CLK
    - SPI_CS_TEMP
    - PWM_L
    - PWM_H
    - VCC_BOOT
    - SHUTDOWN_N

  # ANALOG: Minimal vias, guard from digital noise
  analog:
    - I_SENSE
    - TEMP_SENSE

  # DIFFERENTIAL: Must via together, matched lengths
  differential:
    - USB_D+
    - USB_D-

# =============================================================================
# LAYER ASSIGNMENTS
# =============================================================================
net_layers:
  # === F.Cu GROUP ===
  # SPI clock stays on F.Cu, MOSI moved to B.Cu to avoid crossing
  SPI_CLK: "F.Cu"
  SPI_CS_TEMP: "F.Cu"
  # MISO moved to F.Cu to avoid I_SENSE crossing
  SPI_MISO: "F.Cu"
  
  # USB must stay on F.Cu (differential pair)
  "USB_D+": "F.Cu"
  "USB_D-": "F.Cu"
  
  VCC_BOOT: "F.Cu"
  
  # === B.Cu GROUP ===
  # Power stage - NO VIAS
  GATE_L: "B.Cu"
  GATE_H: "B.Cu"
  SW_NODE: "B.Cu"
  
  # MOSI moved to B.Cu to avoid SPI_CLK crossing
  SPI_MOSI: "B.Cu"
  
  # PWM moved to B.Cu to avoid USB crossing
  PWM_L: "B.Cu"
  PWM_H: "B.Cu"
  
  # Analog on B.Cu
  I_SENSE: "B.Cu"
  TEMP_SENSE: "B.Cu"

# =============================================================================
# CROSSING RULES
# =============================================================================
crossing_rules:
  # Acceptable crossings (no via needed):
  # - Power-to-power: unavoidable, vias add inductance
  # - Differential pairs: expected behavior
  # - Control-to-power: PWM must reach gate drivers near power stage
  accept_crossings:
    - [GATE_L, SW_NODE]
    - [GATE_H, SW_NODE]
    - [GATE_L, GATE_H]
    - [USB_D+, USB_D-]  # Differential pair
    - [PWM_L, SW_NODE]  # Control must cross power to reach gate driver
    - [PWM_H, SW_NODE]  # Control must cross power to reach gate driver
    - [SPI_CLK, SPI_MISO]  # SPI signals - route carefully
  
  # Control crossings that need vias (if they occur):
  via_at_crossing:
    - [SPI_MOSI, SPI_CLK]
    - [SPI_CS_TEMP, SPI_MOSI]
    - [PWM_L, USB_D+]
    - [PWM_L, USB_D-]
    - [PWM_H, USB_D+]
    - [PWM_H, USB_D-]
    - [I_SENSE, SPI_MISO]
    - [I_SENSE, SPI_CLK]
    - [I_SENSE, SPI_MOSI]

net_class_layers: {}
