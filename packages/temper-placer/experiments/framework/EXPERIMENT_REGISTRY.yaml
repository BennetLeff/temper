meta:
  created: "2025-12-25"
  format_version: "1.0"
  maintainer: "temper-agent"

# =============================================================================
# COMPLETED EXPERIMENTS
# =============================================================================

completed:
  temper-a98v:
    name: "Spread Loss Edge Effects"
    date: "2025-12"
    hypothesis: "SpreadLoss pushes components to board edges"
    result: "CONFIRMED - EdgeAvoidanceLoss works (6.3mm vs 4.7mm from edge)"
    key_finding: "Routing completion unchanged (~12%) - bottleneck is elsewhere"
    report: "experiments/temper-a98v/REPORT.md"
    metrics:
      edge_distance_baseline_mm: 4.7
      edge_distance_with_loss_mm: 6.3
      routing_completion_percent: 12.0

  temper-65nd:
    name: "Wirelength Alpha Annealing"
    date: "2025-12"
    hypothesis: "LogSumExp alpha annealing improves final HPWL"
    result: "PENDING ANALYSIS"
    report: "experiments/temper-65nd/REPORT.md"
    runs: 8

  temper-gcp:
    name: "Optimizer Robustness"
    date: "2025-12"
    hypothesis: "Soft-body inflation + adaptive weighting reduces failures"
    result: "CONFIRMED - 65% failure rate reduction (23% -> 8%)"
    key_findings:
      - "Mean overlap reduced 28% (0.5 -> 0.36)"
      - "Loss CV reduced 26%"
    report: "OPTIMIZER_ROBUSTNESS_SUMMARY.md"

