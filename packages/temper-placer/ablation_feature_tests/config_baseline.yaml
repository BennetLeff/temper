  nets:
  - GATE_LS
  - DC_BUS_RTN
  weight: 10.0
- description: Main commutation loop - most critical for EMI
  max_area_mm2: 500.0
  name: power_stage_commutation
  nets:
  - +340V_BUS
  - SW_NODE
  - DC_BUS_RTN
  weight: 15.0
- description: Bus capacitors to half-bridge
  max_area_mm2: 800.0
  name: dc_bus_bypass
  nets:
  - +340V_BUS
  - DC_BUS_RTN
  weight: 8.0
