<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Render Test</title>
<style>body{font:14px monospace;padding:20px}#log{white-space:pre;background:#eee;padding:10px}</style>
</head>
<body>
<h1>Render Pipeline Test</h1>
<div id="log"></div>
<canvas id="board-canvas" width="800" height="600" style="border:1px solid #ccc"></canvas>
<script type="module">
import init, { load_board, start_render_loop } from './wasm/temper_viewer.js';
const log = msg => { const d=document.getElementById('log'); d.textContent+=msg+'\n'; console.log(msg); };

try {
    log('Initializing WASM...');
    await init();
    log('WASM init OK');

    log('Loading embedded board...');
    const el = document.getElementById('default-board');
    if (!el) { log('No default-board tag'); }
    const data = JSON.parse(el.textContent);
    log(`Board: ${data.board.width}x${data.board.height}mm, ${data.board.components.length} comps`);

    log('Calling load_board...');
    await load_board(JSON.stringify(data));
    log('load_board OK');

    log('Calling start_render_loop...');
    await start_render_loop('board-canvas');
    log('start_render_loop OK - board should be visible!');

} catch(e) {
    log(`ERROR: ${e.message || e}`);
    console.error(e);
}
</script>
<script id="default-board" type="application/json" src="data:,"></script>
<script>
// Copy from main HTML
fetch('wasm-viewer.html?v=4').then(r=>r.text()).then(html=>{
    const m = html.match(/<script id="default-board" type="application\/json">(.*?)<\/script>/s);
    if(m) document.getElementById('default-board').textContent = m[1];
});
</script>
</body>
</html>
