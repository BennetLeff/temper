# Fanout configuration for EXP-01: Pitchfork
# Testing router fanout on 1.27mm fine grids

router:
  fanout:
    enabled: true
    pitch_mm: 1.27
    via_drill_mm: 0.3
    via_size_mm: 0.6
    trace_width_mm: 0.2
    strategy: "staggered"
    via_clearance_mm: 0.2

board:
  width_mm: 80.0
  height_mm: 60.0
  layers: 2

test:
  target_pitch_mm: 1.27
  expected_completion_pct: 100.0
