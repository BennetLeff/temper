# Experiment temper-65nd: Wirelength Loss Alpha Annealing
# Annealed condition: Alpha anneals from 1.0 to 20.0 with 20% warmup
#
# This is the proposed new default behavior:
# - Early epochs (0-20%): Low alpha (1.0) for smooth gradients
# - Late epochs (20%-100%): Linear anneal to high alpha (20.0)
#   for sharp HPWL approximation

board:
  width_mm: 60.0
  height_mm: 40.0
  margin_mm: 5.0

losses:
  overlap:
    weight: 100.0
    enabled: true
  boundary:
    weight: 50.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
    alpha_start: 1.0     # ANNEALED: start with smooth approximation
    alpha_end: 20.0      # ANNEALED: end with sharp approximation
    alpha_warmup: 0.2    # ANNEALED: 20% warmup at low alpha
  spread:
    weight: 1.0
    enabled: true
