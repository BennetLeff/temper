# Experiment temper-65nd: Wirelength Loss Alpha Annealing
# Control B: Constant low alpha (1.0)
#
# Purpose: Test if low alpha alone provides benefit (smooth gradients
# throughout training), or if the transition to high alpha is needed.

board:
  width_mm: 60.0
  height_mm: 40.0
  margin_mm: 5.0

losses:
  overlap:
    weight: 100.0
    enabled: true
  boundary:
    weight: 50.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
    alpha: 1.0  # CONTROL: constant low alpha
  spread:
    weight: 1.0
    enabled: true
