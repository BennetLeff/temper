# Experiment temper-65nd: Wirelength Loss Alpha Annealing
# Baseline condition: Constant alpha=10.0 (backward compatible behavior)
#
# Hypothesis: Annealed alpha (1.0 -> 20.0) produces lower final HPWL
# than constant alpha (10.0) by providing smooth gradients early
# and sharp approximation late.

board:
  width_mm: 60.0
  height_mm: 40.0
  margin_mm: 5.0

losses:
  overlap:
    weight: 100.0
    enabled: true
  boundary:
    weight: 50.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
    alpha: 10.0  # BASELINE: constant alpha for backward compatibility
  spread:
    weight: 1.0
    enabled: true
