# EXP-03 Configuration: Force Field (Spacing Unit Test)

# Board dimensions for synthetic test PCB
board:
  width_mm: 80.0
  height_mm: 60.0
  margin_mm: 5.0

# Component spacing rules for calibration
# These define the minimum edge-to-edge distances we want to enforce
component_spacing:
  rules:
    - component_a: "D2"
      component_b: "C_BUS2"
      min_separation_mm: 3.0
      weight: 50.0
      because: "HV clearance: 3mm for 12V diodes near capacitors"

    - component_a: "D2"
      component_b: "Q2"
      min_separation_mm: 2.0
      weight: 50.0
      because: "HV clearance: diode to MOSFET spacing"

    - component_a: "Q1"
      component_b: "Q2"
      min_separation_mm: 5.0
      weight: 50.0
      because: "Half-bridge MOSFETs need thermal/mechanical spacing"

# Loss function configuration
losses:
  overlap:
    weight: 100.0
    enabled: true
  boundary:
    weight: 50.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
  spread:
    weight: 0.5
    enabled: true
  component_spacing:
    weight: 50.0
    enabled: true
    use_rotated_bounds: true

# Optimization parameters
optimization:
  epochs: 1000
  learning_rate: 0.1
  batch_size: 32

# Test configurations for calibration
tests:
  distances:
    - 0.0    # Touching (maximum violation)
    - 1.0    # 1mm gap
    - 2.0    # 2mm gap
    - 3.0    # 3mm gap (threshold)
    - 5.0    # 5mm gap
    - 10.0   # 10mm gap (no violation)

  expected_loss:
    touching: "> 1000"
    1mm_gap: "> 100"
    2mm_gap: "> 10"
    3mm_gap: "~ 0"
    5mm_gap: 0
    10mm_gap: 0
