# Option C condition for temper-a98v experiment
# spread_weight = 1.0, edge_avoidance_weight = 0.5

board:
  width_mm: 60.0
  height_mm: 40.0
  margin_mm: 5.0

losses:
  overlap:
    weight: 100.0
    enabled: true
  boundary:
    weight: 50.0
    enabled: true
  wirelength:
    weight: 10.0
    enabled: true
  spread:
    weight: 1.0
    enabled: true
  edge_avoidance:
    weight: 0.5  # OPTION C: added edge avoidance loss
    enabled: true
