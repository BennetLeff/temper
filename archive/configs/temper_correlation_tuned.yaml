# Correlation-Tuned Loss Configuration for Temper PCB
# =======================================================
#
# Based on correlation analysis (temper-h0n9 epic):
#   - 30 samples with FreeRouting verification
#   - Inter-loss correlation analysis (r=0.94 overlap↔spread)
#   - Epoch tier variance experiments
#
# Key Findings:
#   1. Overlap is the best routing predictor (r=-0.38 with completion)
#   2. Spread is confounded with overlap (r=0.94) - REMOVED
#   3. *_per_component losses are redundant (r=1.0) - REMOVED
#   4. Wirelength validates metric but doesn't predict routing (r=0.0)
#   5. Boundary was constant (no violations) but needed for constraints
#
# Weight Rationale:
#   - overlap: HIGH (1000) - Primary routing predictor, minimize overlaps first
#   - boundary: MODERATE (100) - Constraint satisfaction, prevent edge violations
#   - clearance: MODERATE (50) - Safety margin between components
#   - wirelength: LOW (1.0) - Doesn't predict routing success, but useful for SI
#   - alignment: LOW (0.5) - Aesthetic, doesn't correlate with routing
#   - group_cluster: LOW (1.0) - Functional grouping, weak routing signal
#
# Reference: metrics/CORRELATION_FINDINGS.md
# Issue: temper-h0n9.4
# Date: 2025-12-21

board:
  width_mm: 100.0
  height_mm: 150.0
  margin_mm: 5.0

losses:
  # PRIMARY: Best routing predictor (r=-0.38 with completion)
  # Higher overlap → worse routing. Minimize this first.
  overlap:
    weight: 1000.0

  # CONSTRAINT: Prevents board edge violations
  # Was constant in analysis (no violations), but essential for valid placements.
  boundary:
    weight: 100.0

  # SAFETY: Minimum clearance between components
  # Provides routing channels even when overlap is zero.
  clearance:
    weight: 50.0

  # SECONDARY: Validates trace length but doesn't predict routing success
  # Wirelength correlates with routed wirelength (r=0.47) but not completion (r=0.0).
  # Keep low weight - local congestion matters more than global wirelength.
  wirelength:
    weight: 1.0

  # AESTHETIC: Grid alignment for visual consistency
  # Weak routing signal, but improves layout aesthetics and manufacturability.
  alignment:
    weight: 0.5

  # ORGANIZATION: Functional module clustering
  # Groups related components, but weak correlation with routing success.
  group_cluster:
    weight: 1.0

# REMOVED LOSSES (with rationale):
# ---------------------------------
# spread: Confounded with overlap (r=0.94). Redundant - overlap captures the same signal.
# overlap_per_component: Perfectly correlates with overlap (r=1.0). Redundant.
# alignment_per_group: Perfectly correlates with alignment (r=1.0). Redundant.
# group_cluster_per_component: Perfectly correlates with group_cluster (r=1.0). Redundant.
# group_cluster_*_diameter: Perfectly correlates with group_cluster_*_penalty (r>0.99). Redundant.

# No zones or groups needed for basic optimization
zones: []
groups: []
