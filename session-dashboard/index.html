<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Dashboard</title>
  <style>
    :root {
      --surface: #0d1117;
      --surface-raised: #161b22;
      --surface-overlay: #1c2128;
      --border: #30363d;
      --border-hover: #58a6ff;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-tertiary: #6e7681;
      --accent: #58a6ff;
      --accent-bg: #1f6feb33;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --radius-sm: 6px;
      --radius-md: 8px;
      --gap: 12px;
      --focus-ring: 0 0 0 3px rgba(88,166,255,0.4);
      --transition: 150ms ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      line-height: 1.6;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px var(--gap);
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .app-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .app-header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; }
    .status-bar { font-size: 0.8125rem; color: var(--text-secondary); }
    .toolbar {
      display: flex; gap: 8px; align-items: center; padding: 8px 0; margin-bottom: 16px; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; min-height: 44px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface-raised); color: var(--text-primary);
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      outline: none; text-decoration: none; white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hover); background: var(--surface-overlay); }
    .btn:focus-visible { box-shadow: var(--focus-ring); border-color: var(--border-hover); }
    .btn:active { background: var(--accent-bg); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: rgba(31,111,235,0.25); color: var(--accent-hover); }
    .btn-ghost { border-color: transparent; background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { border-color: var(--border); color: var(--text-primary); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .icon { width: 14px; height: 14px; flex-shrink: 0; vertical-align: middle; }
    .card-meta-item svg { width: 12px; height: 12px; }
    .msg-block svg { width: 12px; height: 12px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state h2 { margin-bottom: 8px; color: var(--text-primary); font-size: 1.125rem; }
    .session-list { display: flex; flex-direction: column; gap: var(--gap); }
    .session-card {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px;
      cursor: pointer; transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .session-card:hover { border-color: var(--border-hover); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .session-card:focus-visible { box-shadow: var(--focus-ring); border-color: var(--border-hover); }
    .card-summary { font-size: 0.9375rem; line-height: 1.6; margin-bottom: 10px; color: var(--text-primary); }
    .card-summary.clamped { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-summary.expanded { -webkit-line-clamp: unset; display: block; }
    .card-meta { display: flex; gap: 16px; font-size: 0.8125rem; color: var(--text-secondary); flex-wrap: wrap; align-items: center; min-height: 32px; }
    .card-meta-item { display: inline-flex; align-items: center; gap: 5px; }
    .card-meta-item svg { width: 14px; height: 14px; opacity: 0.7; }
    .card-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .session-card.expanded .card-detail { display: block; }
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.01em;
    }
    .tag-project { background: var(--accent-bg); color: var(--accent); }
    .tag-subagent { background: rgba(63,185,80,0.15); color: var(--success); }
    .tag-type { background: var(--surface-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 1000; overflow-y: auto; padding: 40px 20px;
    }
    .modal-overlay.open { display: block; }
    .modal-content { max-width: 820px; margin: 0 auto; color: var(--text-primary); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header strong { font-size: 1rem; }
    .msg-block { margin: 4px 0; padding: 10px 12px; border-left: 3px solid var(--border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .msg-block.user { border-left-color: var(--accent); background: var(--accent-bg); }
    .msg-block.assistant { border-left-color: var(--text-tertiary); }
    .msg-block.tool { border-left-color: var(--warning); background: rgba(210,153,34,0.08); }
    .msg-block.result { border-left-color: var(--success); background: rgba(63,185,80,0.08); }
    .msg-label { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; color: var(--text-tertiary); }
    .msg-content { white-space: pre-wrap; font: inherit; font-size: 0.8125rem; line-height: 1.6; max-height: 360px; overflow-y: auto; margin: 0; }
    .load-more { display: block; margin: 20px auto; min-width: 240px; }
    #health-board { margin-bottom: 16px; }
    .health-board { transition: opacity .3s; }
    .health-summary {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      padding: 8px 12px; margin-bottom: 8px;
      font-size: 0.8125rem; color: var(--text-secondary);
    }
    .health-summary .count { font-weight: 600; }
    .health-summary .count-active { color: var(--success); }
    .health-summary .count-stalled { color: var(--error); }
    .health-summary .count-idle { color: var(--text-tertiary); }
    .health-summary .count-blocked { color: var(--warning); }
    .pipeline-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface-raised);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: border-color var(--transition), background var(--transition);
      outline: none; font-size: 0.8125rem;
    }
    .pipeline-row + .pipeline-row { margin-top: 6px; }
    .pipeline-row:hover { border-color: var(--border-hover); background: var(--surface-overlay); }
    .pipeline-row:focus-visible { box-shadow: var(--focus-ring); }
    .pipeline-row.selected { border-color: var(--accent); background: var(--accent-bg); }
    .pipeline-name { flex: 1; font-weight: 500; color: var(--text-primary); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .phase-badge {
      padding: 1px 7px; border-radius: 10px; font-size: 0.6875rem; font-weight: 500;
      background: var(--surface-overlay); color: var(--text-secondary); border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-active .status-dot { background: var(--success); }
    .status-stalled .status-dot { background: var(--error); animation: pulse-red 2s ease-in-out infinite; }
    .status-idle .status-dot { background: var(--text-tertiary); }
    .status-blocked .status-dot { background: var(--warning); }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .status-label { font-size: 0.75rem; font-weight: 500; flex-shrink: 0; }
    .status-active .status-label { color: var(--success); }
    .status-stalled .status-label { color: var(--error); }
    .status-idle .status-label { color: var(--text-tertiary); }
    .status-blocked .status-label { color: var(--warning); }
    .agent-count {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 8px; font-size: 0.6875rem;
      background: rgba(63,185,80,0.12); color: var(--success);
      flex-shrink: 0;
    }
    .staleness-text { color: var(--text-tertiary); font-size: 0.75rem; white-space: nowrap; flex-shrink: 0; }
    .health-skeleton { pointer-events: none; }
    .skeleton-row {
      height: 40px; margin-bottom: 6px; border-radius: var(--radius-sm);
      background: linear-gradient(90deg, var(--surface-raised) 25%, var(--surface-overlay) 50%, var(--surface-raised) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-summary { height: 20px; width: 240px; margin-bottom: 10px; border-radius: 4px; background: linear-gradient(90deg, var(--surface-raised) 25%, var(--surface-overlay) 50%, var(--surface-raised) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .health-error-banner {
      padding: 6px 12px; margin-bottom: 8px;
      font-size: 0.75rem; color: var(--text-tertiary);
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-sm); display: none;
    }
    .health-error-banner.visible { display: block; }
    .filter-indicator {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 10px; margin-left: 8px;
      font-size: 0.8125rem; color: var(--accent);
      background: var(--accent-bg); border-radius: var(--radius-sm);
    }
    .filter-indicator strong { font-weight: 600; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Session Dashboard</h1>
    <div id="status-bar" class="status-bar" aria-live="polite">Starting...</div>
  </header>
  <main>
    <div class="toolbar">
      <button class="btn btn-primary" id="refresh-btn" aria-label="Refresh sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <span style="font-size:0.8125rem;color:var(--text-secondary)" id="page-info" aria-live="polite"></span>
    </div>
    <div id="health-board">
      <div class="health-skeleton">
        <div class="skeleton-summary"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
    </div>
    <div id="session-list" class="session-list" role="feed" aria-label="Session list"></div>
  </main>
  <div id="raw-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Raw conversation viewer">
    <div class="modal-content" id="raw-modal-content"></div>
  </div>

  <svg style="display:none" aria-hidden="true">
    <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
    <symbol id="icon-bot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
    <symbol id="icon-branch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></symbol>
    <symbol id="icon-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></symbol>
    <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></symbol>
  </svg>

  <script type="module">
    const status = document.getElementById('status-bar');
    const listEl = document.getElementById('session-list');
    const pageInfo = document.getElementById('page-info');
    const modal = document.getElementById('raw-modal');
    const modalContent = document.getElementById('raw-modal-content');
    const healthBoardEl = document.getElementById('health-board');
    const PAGE_SIZE = 50;
    const STALL_THRESHOLD_MS = 5 * 60 * 1000;
    const POLL_INTERVAL_MS = 30000;
    const FETCH_LIMIT = 200;
    let offset = 0, total = 0, sessions = [];
    let healthData = null;
    let currentFilter = null;
    let pollTimer = null;
    let stalenessRaf = null;
    let firstHealthFetchDone = false;

    function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
    function svgIcon(name) { return `<svg class="icon" aria-hidden="true"><use href="#icon-${name}"/></svg>`; }

    function fmtDur(ms) {
      if (!ms || ms < 0) return '';
      const s = Math.round(ms / 1000);
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.round(s / 60)}m`;
      return `${(s / 3600).toFixed(1)}h`;
    }
    function fmtTime(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return '';
        const diff = Date.now() - d;
        if (diff < 864e5) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        if (diff < 6048e5) return d.toLocaleDateString([], {weekday:'short',hour:'2-digit',minute:'2-digit'});
        return d.toLocaleDateString([], {month:'short',day:'numeric'});
      } catch { return ''; }
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      if (diff < 0) return 'just now';
      const s = Math.round(diff / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.round(s / 60)}m ago`;
      if (s < 86400) return `${Math.round(s / 3600)}h ago`;
      return `${Math.round(s / 86400)}d ago`;
    }

    function derivePipelineHealth(sessions) {
      const groups = new Map();
      for (const s of sessions) {
        const project = s.project || '(unknown)';
        if (!groups.has(project)) groups.set(project, []);
        groups.get(project).push(s);
      }

      const pipelines = [];
      for (const [project, projectSessions] of groups) {
        const sorted = [...projectSessions].sort((a, b) => {
          const ta = a.startedAt ? new Date(a.startedAt).getTime() : 0;
          const tb = b.startedAt ? new Date(b.startedAt).getTime() : 0;
          return tb - ta;
        });
        const latest = sorted[0];

        let phase = 'active';
        if (latest.agentType) {
          const parts = latest.agentType.split(':');
          if (parts.length > 1) phase = parts[parts.length - 1];
        }

        let status = 'active';
        let stalenessTs = null;

        if (latest.blockedReason || latest.dependsOn) {
          status = 'blocked';
        }

        if (status === 'active') {
          if (latest.duration && latest.startedAt) {
            const started = new Date(latest.startedAt).getTime();
            if (started + latest.duration < Date.now()) {
              status = 'idle';
              stalenessTs = started + latest.duration;
            }
          }
        }

        if (status === 'active') {
          const lastMsg = latest.lastMessageTimestamp || latest.startedAt;
          if (lastMsg) {
            stalenessTs = new Date(lastMsg).getTime();
            if (Date.now() - stalenessTs > STALL_THRESHOLD_MS) {
              status = 'stalled';
            }
          }
        }

        const stalenessText = stalenessTs ? timeAgo(stalenessTs) : '—';

        pipelines.push({
          project,
          phase,
          status,
          subAgentCount: latest.subAgentCount || 0,
          latestSession: latest,
          stalenessText,
          stalenessTs,
        });
      }

      pipelines.sort((a, b) => {
        const order = { stalled: 0, active: 1, blocked: 2, idle: 3 };
        return (order[a.status] ?? 4) - (order[b.status] ?? 4);
      });

      const summary = { active: 0, stalled: 0, idle: 0, blocked: 0 };
      for (const p of pipelines) summary[p.status]++;

      return { pipelines, summary };
    }

    function renderHealthBoard(data) {
      healthData = data;
      firstHealthFetchDone = true;

      const { pipelines, summary } = data;
      const total = pipelines.length;

      let html = '<div class="health-board">';
      html += '<div class="health-error-banner"></div>';

      if (total === 0) {
        html += '<div class="health-summary">0 pipelines active</div>';
        html += '<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:0.8125rem">No pipeline activity</div>';
      } else {
        const parts = [];
        if (summary.active) parts.push(`<span class="count count-active">${summary.active} active</span>`);
        if (summary.stalled) parts.push(`<span class="count count-stalled">${summary.stalled} stalled</span>`);
        if (summary.idle) parts.push(`<span class="count count-idle">${summary.idle} idle</span>`);
        if (summary.blocked) parts.push(`<span class="count count-blocked">${summary.blocked} blocked</span>`);
        html += `<div class="health-summary">${total} pipeline${total !== 1 ? 's' : ''} \u2014 ${parts.join(', ')}</div>`;

        html += '<div class="health-pipelines">';
        for (const p of pipelines) {
          const selected = currentFilter && currentFilter.project === p.project;
          html += `<div class="pipeline-row status-${p.status}${selected ? ' selected' : ''}" data-project="${esc(p.project)}" tabindex="0" role="button" aria-label="Filter by ${esc(p.project)}">
            <span class="status-dot"></span>
            <span class="pipeline-name">${esc(p.project)}</span>
            <span class="phase-badge">${esc(p.phase)}</span>
            <span class="status-label">${p.status}</span>
            ${p.subAgentCount > 0 ? `<span class="agent-count">${svgIcon('bot')}${p.subAgentCount}</span>` : ''}
            <span class="staleness-text">${esc(p.stalenessText)}</span>
          </div>`;
        }
        html += '</div>';
      }

      html += '</div>';
      healthBoardEl.innerHTML = html;

      const rows = healthBoardEl.querySelectorAll('.pipeline-row');
      for (const row of rows) {
        row.addEventListener('click', () => onPipelineRowClick(row.dataset.project));
        row.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPipelineRowClick(row.dataset.project); }
        });
      }
    }

    function renderHealthBoardSkeleton() {
      healthBoardEl.innerHTML = '<div class="health-skeleton"><div class="skeleton-summary"></div><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>';
    }

    function showHealthBoardError() {
      if (firstHealthFetchDone) {
        const board = healthBoardEl.querySelector('.health-board');
        if (board) {
          const banner = board.querySelector('.health-error-banner');
          if (banner) {
            banner.classList.add('visible');
            banner.textContent = 'Status board unavailable \u2014 retrying...';
          }
        }
      } else {
        healthBoardEl.innerHTML = '<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:0.8125rem">Status board unavailable</div>';
      }
    }

    function hideHealthBoardError() {
      const banner = healthBoardEl.querySelector('.health-error-banner');
      if (banner) banner.classList.remove('visible');
    }

    function updateStalenessTexts() {
      if (!healthData) return;
      const now = Date.now();
      const rows = healthBoardEl.querySelectorAll('.pipeline-row');
      for (const row of rows) {
        const project = row.dataset.project;
        const pipeline = healthData.pipelines.find(p => p.project === project);
        if (!pipeline) continue;

        const stalenessEl = row.querySelector('.staleness-text');
        if (!stalenessEl) continue;

        if (pipeline.status === 'active' && pipeline.stalenessTs) {
          if (now - pipeline.stalenessTs > STALL_THRESHOLD_MS) {
            pipeline.status = 'stalled';
            row.classList.remove('status-active');
            row.classList.add('status-stalled');
            const label = row.querySelector('.status-label');
            if (label) label.textContent = 'stalled';
          }
        }

        if (pipeline.stalenessTs) {
          stalenessEl.textContent = timeAgo(pipeline.stalenessTs);
        }
      }
    }

    function onPipelineRowClick(project) {
      if (currentFilter && currentFilter.project === project) return;
      currentFilter = { project };
      renderHealthBoard(healthData);
      applyFilterToSessionList();
    }

    function clearFilter() {
      currentFilter = null;
      if (healthData) renderHealthBoard(healthData);
      renderList();
      updateFilterIndicator();
    }

    function applyFilterToSessionList() {
      renderList();
      updateFilterIndicator();
    }

    function updateFilterIndicator() {
      const toolbar = document.querySelector('.toolbar');
      if (!toolbar) return;
      let indicator = toolbar.querySelector('.filter-indicator');
      if (currentFilter) {
        if (!indicator) {
          indicator = document.createElement('span');
          indicator.className = 'filter-indicator';
          toolbar.appendChild(indicator);
        }
        indicator.innerHTML = `Showing: <strong>${esc(currentFilter.project)}</strong> <button class="btn btn-ghost" id="clear-filter-btn" style="padding:2px 6px;min-height:auto;font-size:0.75rem" aria-label="Clear filter">${svgIcon('x')} Clear</button>`;
        const clearBtn = indicator.querySelector('#clear-filter-btn');
        if (clearBtn) clearBtn.onclick = (e) => { e.stopPropagation(); clearFilter(); };
      } else {
        if (indicator) indicator.remove();
      }
    }

    async function fetchPage(reset) {
      if (reset) { offset = 0; sessions = []; listEl.innerHTML = ''; }
      status.textContent = 'Loading...';
      try {
        const res = await fetch(`/api/sessions?limit=${PAGE_SIZE}&offset=${offset}`);
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        const data = await res.json();
        sessions = reset ? data.sessions : [...sessions, ...data.sessions];
        total = data.total;
        renderList();
        pageInfo.textContent = `${sessions.length} of ${total}`;
        status.textContent = 'Ready';
      } catch(e) {
        status.textContent = 'Error: ' + e.message;
        if (!sessions.length && listEl.children.length === 0) {
          listEl.className = 'empty-state';
          listEl.innerHTML = `<h2>Cannot reach server</h2><p>Make sure <code>python3 server.py</code> is running in the session-dashboard directory.</p><p style="margin-top:12px"><button class="btn btn-primary" onclick="location.reload()">Retry</button></p>`;
        }
      }
    }

    async function fetchAndUpdate() {
      try {
        const res = await fetch(`/api/sessions?limit=${FETCH_LIMIT}&offset=0`);
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        const data = await res.json();

        const health = derivePipelineHealth(data.sessions);
        renderHealthBoard(health);
        hideHealthBoardError();

        if (currentFilter) {
          const filtered = data.sessions.filter(s => s.project === currentFilter.project);
          if (filtered.length === 0) {
            clearFilter();
          } else {
            sessions = filtered;
            total = data.total;
            renderList();
            updateFilterIndicator();
            pageInfo.textContent = `${sessions.length} of ${total} (filtered)`;
          }
        } else {
          sessions = data.sessions;
          total = data.total;
          renderList();
          pageInfo.textContent = `${sessions.length} of ${total}`;
        }
      } catch(e) {
        showHealthBoardError();
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(fetchAndUpdate, POLL_INTERVAL_MS);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      if (stalenessRaf) { cancelAnimationFrame(stalenessRaf); stalenessRaf = null; }
    }

    function startStalenessTimer() {
      function tick() {
        updateStalenessTexts();
        stalenessRaf = requestAnimationFrame(tick);
      }
      stalenessRaf = requestAnimationFrame(tick);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopPolling();
      } else {
        startPolling();
        startStalenessTimer();
      }
    });

    function renderList() {
      const data = currentFilter ? sessions.filter(s => s.project === currentFilter.project) : sessions;
      if (!data.length) {
        listEl.className = 'empty-state';
        listEl.innerHTML = currentFilter
          ? `<h2>No sessions for &ldquo;${esc(currentFilter.project)}&rdquo;</h2><p><button class="btn btn-ghost" onclick="window.clearFilter()" style="color:var(--accent)">Clear filter</button></p>`
          : '<h2>No sessions found</h2><p>Check that ~/.claude/projects/ has session data.</p>';
        return;
      }
      listEl.className = 'session-list';
      listEl.innerHTML = '';
      for (const s of data) {
        try {
          const card = renderCard(s);
          card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
          listEl.appendChild(card);
        } catch(e) {
          const err = document.createElement('div');
          err.className = 'session-card';
          err.textContent = `Error: ${s.id || '?'} \u2014 ${e.message}`;
          listEl.appendChild(err);
        }
      }
      if (!currentFilter && data.length < total) {
        const more = document.createElement('button');
        more.className = 'btn btn-primary load-more';
        more.textContent = `Load more (${sessions.length} of ${total})`;
        more.setAttribute('aria-label', `Load more sessions. Currently showing ${sessions.length} of ${total}`);
        more.onclick = () => { offset += PAGE_SIZE; fetchPage(false); };
        listEl.appendChild(more);
      }
    }

    async function viewRaw(sid) {
      modalContent.innerHTML = `<p style="color:var(--text-secondary);text-align:center;padding:60px">Loading...</p>`;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('refresh-btn').focus();
      try {
        const res = await fetch(`/api/session/${sid}`);
        if (!res.ok) throw new Error('Session not found');
        const data = await res.json();
        const msgs = data.messages || [];
        let html = `<div class="modal-header">
          <div><strong>${esc(data.project || sid)}</strong>${data.branch ? ` <span style="color:var(--text-secondary)">on ${esc(data.branch)}</span>` : ''}</div>
          <button class="btn btn-ghost" onclick="closeModal()" aria-label="Close">${svgIcon('x')}</button>
        </div>`;
        for (const m of msgs) {
          const msg = m.message || m;
          const blocks = Array.isArray(msg?.content) ? msg.content : [{type:'text', text: typeof msg === 'string' ? msg : JSON.stringify(msg)}];
          for (const block of blocks) {
            let label = msg.role || m.type || '?';
            let text = '';
            const bt = block.type || 'unknown';
            if (bt === 'text') text = block.text || '';
            else if (bt === 'tool_use') { label = `tool: ${block.name || '?'}`; text = JSON.stringify(block.input || {}).slice(0, 1000); }
            else if (bt === 'tool_result') {
              label = 'result';
              const c = block.content;
              text = typeof c === 'string' ? c : (Array.isArray(c) ? c.map(x => x.text || '').join('\n') : JSON.stringify(c || {}));
            } else text = JSON.stringify(block).slice(0, 1000);
            if (!text && bt === 'unknown') continue;
            const cls = label.startsWith('user') ? 'user' : label.startsWith('assistant') ? 'assistant' : label.startsWith('tool') ? 'tool' : label.startsWith('result') ? 'result' : '';
            html += `<div class="msg-block ${cls}"><div class="msg-label">${esc(label)}</div><pre class="msg-content">${esc(text.slice(0, 3000))}</pre></div>`;
          }
        }
        html += `<p style="color:var(--text-secondary);text-align:center;padding:20px">${msgs.length} messages</p>`;
        modalContent.innerHTML = html;
      } catch(e) {
        modalContent.innerHTML = `<p style="color:var(--error);text-align:center;padding:60px">${esc(e.message)}</p>`;
      }
    }

    function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }
    window.closeModal = closeModal;
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

    function renderCard(s) {
      const summary = s.summary || 'Session';
      const dur = fmtDur(s.duration);
      const ts = fmtTime(s.startedAt);

      const card = document.createElement('div');
      card.className = 'session-card';
      card.setAttribute('role', 'article');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${summary}, ${s.project || ''}${s.branch ? ', ' + s.branch : ''}`);

      const summaryEl = document.createElement('div');
      summaryEl.className = 'card-summary clamped';
      summaryEl.textContent = summary;

      const meta = document.createElement('div');
      meta.className = 'card-meta';
      const items = [
        dur ? `<span class="card-meta-item">${svgIcon('clock')}${dur}</span>` : '',
        s.subAgentCount > 0 ? `<span class="card-meta-item">${svgIcon('bot')}${s.subAgentCount}</span>` : '',
        s.branch ? `<span class="card-meta-item">${svgIcon('branch')}${esc(s.branch)}</span>` : '',
        ts ? `<span class="card-meta-item">${svgIcon('calendar')}${ts}</span>` : '',
        s.project ? `<span class="tag tag-project">${esc(s.project)}</span>` : '',
        s.agentType ? `<span class="tag tag-type">${esc(s.agentType.split(':').pop())}</span>` : '',
        s.isSubagent ? '<span class="tag tag-subagent">sub-agent</span>' : '',
      ];
      meta.innerHTML = items.filter(Boolean).join('');

      const detail = document.createElement('div');
      detail.className = 'card-detail';
      detail.innerHTML = [
        `<div style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:8px">${esc(summary)}</div>`,
        s.agentType ? `<div style="font-size:0.75rem;color:var(--text-tertiary);margin:4px 0">${svgIcon('folder')} ${esc(s.agentType)}</div>` : '',
        s.cwd ? `<div style="font-size:0.75rem;color:var(--text-tertiary);margin:4px 0">${svgIcon('file')} ${esc(s.cwd)}</div>` : '',
        `<button class="btn btn-ghost" style="margin-top:8px;font-size:0.8125rem" aria-label="View raw conversation for ${esc(summary)}">${svgIcon('file')} View raw conversation</button>`,
      ].join('');

      card.appendChild(summaryEl);
      card.appendChild(meta);
      card.appendChild(detail);

      let expanded = false;
      card.onclick = () => {
        expanded = !expanded;
        card.classList.toggle('expanded', expanded);
        summaryEl.classList.toggle('clamped', !expanded);
        summaryEl.classList.toggle('expanded', expanded);
      };

      const rawBtn = detail.querySelector('button');
      if (rawBtn) rawBtn.onclick = (e) => { e.stopPropagation(); viewRaw(s.id); };

      return card;
    }

    window.clearFilter = clearFilter;
    document.getElementById('refresh-btn').onclick = () => fetchPage(true);
    fetchPage(true);
    renderHealthBoardSkeleton();
    startPolling();
    startStalenessTimer();
  </script>
</body>
</html>
