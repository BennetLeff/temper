<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4" defer></script>
  <style>
    :root {
      --surface: #0d1117;
      --surface-raised: #161b22;
      --surface-overlay: #1c2128;
      --border: #30363d;
      --border-hover: #58a6ff;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-tertiary: #6e7681;
      --accent: #58a6ff;
      --accent-bg: #1f6feb33;
      --accent-hover: #79c0ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --radius-sm: 6px;
      --radius-md: 8px;
      --gap: 12px;
      --focus-ring: 0 0 0 3px rgba(88,166,255,0.4);
      --transition: 150ms ease;
      --phase-ideate: #f59e0b;
      --phase-brainstorm: #a855f7;
      --phase-plan: #3b82f6;
      --phase-work: #22c55e;
      --phase-code-review: #ef4444;
      --phase-doc-review: #eab308;
      --phase-other: #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      line-height: 1.6;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px var(--gap);
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      .card-detail { transition: none !important; }
    }
    .app-header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .app-header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; }
    .status-bar { font-size: 0.8125rem; color: var(--text-secondary); }

    .tab-bar {
      display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .tab-btn {
      padding: 10px 20px; border: none; background: none; color: var(--text-secondary);
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      border-bottom: 2px solid transparent; transition: all var(--transition);
      font-family: inherit; outline: none;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn:focus-visible { box-shadow: var(--focus-ring); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .toolbar {
      display: flex; gap: 8px; align-items: center; padding: 8px 0; margin-bottom: 16px; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; min-height: 44px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface-raised); color: var(--text-primary);
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      outline: none; text-decoration: none; white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hover); background: var(--surface-overlay); }
    .btn:focus-visible { box-shadow: var(--focus-ring); border-color: var(--border-hover); }
    .btn:active { background: var(--accent-bg); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: rgba(31,111,235,0.25); color: var(--accent-hover); }
    .btn-ghost { border-color: transparent; background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { border-color: var(--border); color: var(--text-primary); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .icon { width: 14px; height: 14px; flex-shrink: 0; vertical-align: middle; }
    .card-meta-item svg { width: 12px; height: 12px; }
    .msg-block svg { width: 12px; height: 12px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state h2 { margin-bottom: 8px; color: var(--text-primary); font-size: 1.125rem; }
    .session-list { display: flex; flex-direction: column; gap: var(--gap); }
    .session-card {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px;
      cursor: pointer; transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    .session-card:hover { border-color: var(--border-hover); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .session-card:focus-visible { box-shadow: var(--focus-ring); border-color: var(--border-hover); }
    .card-summary { font-size: 0.9375rem; line-height: 1.6; margin-bottom: 10px; color: var(--text-primary); }
    .card-summary.clamped { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-summary.expanded { -webkit-line-clamp: unset; display: block; }
    .card-meta { display: flex; gap: 16px; font-size: 0.8125rem; color: var(--text-secondary); flex-wrap: wrap; align-items: center; min-height: 32px; }
    .card-meta-item { display: inline-flex; align-items: center; gap: 5px; }
    .card-meta-item svg { width: 14px; height: 14px; opacity: 0.7; }
    .card-detail {
      display: block;
      max-height: 0;
      overflow: hidden;
      transition: max-height 200ms ease, opacity 150ms ease;
      opacity: 0;
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }
    .session-card.expanded .card-detail {
      max-height: 2000px;
      opacity: 1;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.01em;
    }
    .tag-project { background: var(--accent-bg); color: var(--accent); }
    .tag-subagent { background: rgba(63,185,80,0.15); color: var(--success); }
    .tag-type { background: var(--surface-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
    .tag-type-deemphasized { font-size: 0.6875rem; color: var(--text-tertiary); opacity: 0.7; }
    .session-card[data-phase="ideate"] { border-left: 3px solid var(--phase-ideate); }
    .session-card[data-phase="brainstorm"] { border-left: 3px solid var(--phase-brainstorm); }
    .session-card[data-phase="plan"] { border-left: 3px solid var(--phase-plan); }
    .session-card[data-phase="work"] { border-left: 3px solid var(--phase-work); }
    .session-card[data-phase="code-review"] { border-left: 3px solid var(--phase-code-review); }
    .session-card[data-phase="doc-review"] { border-left: 3px solid var(--phase-doc-review); }
    .session-card[data-phase="other"] { border-left: 3px solid var(--phase-other); }
    .tag-phase-ideate { background: rgba(245,158,11,0.15); color: var(--phase-ideate); border-color: var(--phase-ideate); }
    .tag-phase-brainstorm { background: rgba(168,85,247,0.15); color: var(--phase-brainstorm); border-color: var(--phase-brainstorm); }
    .tag-phase-plan { background: rgba(59,130,246,0.15); color: var(--phase-plan); border-color: var(--phase-plan); }
    .tag-phase-work { background: rgba(34,197,94,0.15); color: var(--phase-work); border-color: var(--phase-work); }
    .tag-phase-code-review { background: rgba(239,68,68,0.15); color: var(--phase-code-review); border-color: var(--phase-code-review); }
    .tag-phase-doc-review { background: rgba(234,179,8,0.15); color: var(--phase-doc-review); border-color: var(--phase-doc-review); }
    .tag-phase-other { background: rgba(107,114,128,0.15); color: var(--phase-other); border-color: var(--phase-other); }
    .phase-filter { display: flex; align-items: center; gap: 8px; padding: 8px 0; margin-bottom: 12px; flex-wrap: wrap; }
    .phase-filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .phase-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px 4px 8px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface-raised); color: var(--text-primary); cursor: pointer; font-size: 0.8125rem; font-weight: 500; transition: opacity var(--transition), border-color var(--transition); user-select: none; }
    .phase-pill:hover { border-color: var(--border-hover); }
    .phase-pill .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .phase-pill .pill-count { font-size: 0.6875rem; color: var(--text-tertiary); margin-left: 2px; }
    .phase-pill.inactive { opacity: 0.5; border-color: var(--border); background: transparent; }
    .phase-pill.inactive .pill-count { opacity: 0.5; }
    .phase-filter-clear { font-size: 0.8125rem; }
    /* Sub-agent rows */
    .subagent-rows { margin: 8px 0; border-radius: var(--radius-sm); overflow: hidden; }
    .subagent-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; font-size: 0.8125rem; cursor: pointer; border-radius: var(--radius-sm); transition: background var(--transition); outline: none; }
    .subagent-row:hover { background: var(--surface-overlay); }
    .subagent-row:focus-visible { box-shadow: var(--focus-ring); }
    .subagent-icon { flex-shrink: 0; color: var(--text-tertiary); }
    .subagent-desc { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
    .subagent-dur { flex-shrink: 0; color: var(--text-tertiary); font-size: 0.75rem; min-width: 36px; text-align: right; }
    .pass-badge { flex-shrink: 0; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.6875rem; font-weight: 700; }
    .pass-badge.passed { background: rgba(63,185,80,0.15); color: var(--success); }
    .pass-badge.failed { background: rgba(248,81,73,0.15); color: var(--error); }
    .subagent-count-badge { background: rgba(63,185,80,0.1); padding: 2px 8px; border-radius: 12px; color: var(--success); display: inline-flex; align-items: center; gap: 4px; }
    .subagent-truncated { width: 100%; justify-content: center; font-size: 0.75rem; color: var(--text-secondary); padding: 6px; min-height: auto; }
    .card-synthetic { border-style: dashed; border-color: var(--text-tertiary); background: var(--surface-overlay); }
    .card-synthetic:hover { border-color: var(--warning); }
    .orphan-tag { background: rgba(210,153,34,0.15); color: var(--warning); }
    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 1000; overflow-y: auto; padding: 40px 20px;
    }
    .modal-overlay.open { display: block; }
    .modal-content { max-width: 820px; margin: 0 auto; color: var(--text-primary); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header strong { font-size: 1rem; }
    .msg-block { margin: 4px 0; padding: 10px 12px; border-left: 3px solid var(--border); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
    .msg-block.user { border-left-color: var(--accent); background: var(--accent-bg); }
    .msg-block.assistant { border-left-color: var(--text-tertiary); }
    .msg-block.tool { border-left-color: var(--warning); background: rgba(210,153,34,0.08); }
    .msg-block.result { border-left-color: var(--success); background: rgba(63,185,80,0.08); }
    .msg-label { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; color: var(--text-tertiary); }
    .msg-content { white-space: pre-wrap; font: inherit; font-size: 0.8125rem; line-height: 1.6; max-height: 360px; overflow-y: auto; margin: 0; }
    .load-more { display: block; margin: 20px auto; min-width: 240px; }
    /* Artifacts */
    .artifact-section { margin-top: 12px; }
    .artifact-section-title { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
    .artifact-group-header { font-size: 0.75rem; color: var(--text-tertiary); margin: 8px 0 4px; }
    .artifact-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 0.8125rem; cursor: pointer; border-radius: var(--radius-sm); transition: background var(--transition); }
    .artifact-row:hover { background: var(--surface-overlay); }
    .artifact-path { color: var(--accent); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .artifact-path:hover { color: var(--accent-hover); text-decoration: underline; }
    .artifact-deleted { color: var(--error); font-size: 0.6875rem; margin-left: 4px; }
    .badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 8px; font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.01em; }
    .badge-idea { background: rgba(210,153,34,0.15); color: var(--warning); }
    .badge-plan { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-req { background: rgba(163,113,247,0.15); color: #a371f7; }
    .badge-sol { background: rgba(63,185,80,0.15); color: var(--success); }
    .badge-hw { background: rgba(248,81,73,0.15); color: var(--error); }
    .badge-doc { background: var(--surface-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
    .badge-review { background: rgba(163,113,247,0.15); color: #a371f7; }
    .badge-fix { background: rgba(248,81,73,0.15); color: var(--error); }
    .badge-design { background: rgba(210,153,34,0.15); color: var(--warning); }
    .badge-report { background: rgba(63,185,80,0.15); color: var(--success); }
    .badge-polish { background: rgba(88,166,255,0.15); color: var(--accent); }
    .badge-work { background: var(--surface-overlay); color: var(--text-secondary); border: 1px solid var(--border); }
    .confidence-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .confidence-dot.high { background: var(--success); }
    .confidence-dot.medium { background: var(--warning); }
    .confidence-dot.low { border: 1px solid var(--text-tertiary); background: transparent; }
    .artifact-toggle { font-size: 0.75rem; color: var(--accent); cursor: pointer; padding: 2px 4px; border: none; background: none; }
    .artifact-toggle:hover { text-decoration: underline; }
    .no-time-note { font-size: 0.75rem; color: var(--warning); margin-top: 8px; }
    /* Preview pane */
    .artifact-preview { margin: 6px 0 6px 16px; border-left: 3px solid var(--accent); background: var(--surface-overlay); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; overflow: hidden; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--surface-raised); border-bottom: 1px solid var(--border); }
    .preview-header span { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); }
    .preview-close { cursor: pointer; border: none; background: none; color: var(--text-secondary); padding: 2px; }
    .preview-close:hover { color: var(--text-primary); }
    .preview-body { padding: 12px; font-size: 0.8125rem; line-height: 1.6; color: var(--text-primary); max-height: 400px; overflow-y: auto; }
    .preview-body h1 { font-size: 1.1rem; margin: 8px 0 4px; }
    .preview-body h2 { font-size: 1rem; margin: 8px 0 4px; }
    .preview-body h3 { font-size: 0.925rem; margin: 6px 0 3px; }
    .preview-body p { margin: 4px 0; }
    .preview-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; overflow-x: auto; margin: 6px 0; }
    .preview-body code { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 0.75rem; }
    .preview-body pre code { background: none; padding: 0; }
    .preview-body :not(pre) > code { background: rgba(88,166,255,0.1); padding: 1px 4px; border-radius: 3px; }
    .preview-body ul, .preview-body ol { padding-left: 20px; margin: 4px 0; }
    .preview-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; margin: 6px 0; color: var(--text-secondary); }
    .preview-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .preview-body a { color: var(--accent); }
    .preview-body a:hover { color: var(--accent-hover); }
    .preview-loading { padding: 20px; text-align: center; color: var(--text-tertiary); font-size: 0.8125rem; }
    .preview-error { padding: 12px; color: var(--error); font-size: 0.8125rem; }
    #refresh-toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      background: var(--accent-bg); border: 1px solid var(--accent);
      color: var(--accent); font-size: 0.8125rem; z-index: 999;
      opacity: 0; transform: translateY(8px);
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: none;
    }
    #refresh-toast.toast-visible {
      opacity: 1; transform: translateY(0);
    }
    .swimlane-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--gap); }
    .swimlane-column { background: var(--surface-overlay); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; min-height: 200px; }
    .swimlane-header { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
    .swimlane-header .count { float: right; color: var(--text-tertiary); }
    .swimlane-column .session-card { margin-bottom: 8px; }
    .search-wrapper { position: relative; display: inline-flex; align-items: center; }
    .search-wrapper input {
      padding: 8px 32px 8px 36px; width: 200px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface-raised); color: var(--text-primary);
      font-size: 0.875rem; font-family: inherit;
      outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-wrapper input:focus { border-color: var(--border-hover); box-shadow: var(--focus-ring); }
    .search-wrapper input::placeholder { color: var(--text-tertiary); }
    .search-wrapper .search-icon { position: absolute; left: 10px; pointer-events: none; color: var(--text-tertiary); width: 16px; height: 16px; }
    .search-wrapper .search-clear { position: absolute; right: 8px; cursor: pointer; display: none; color: var(--text-secondary); font-size: 16px; line-height: 1; padding: 0 4px; }
    .search-wrapper .search-clear.visible { display: block; }
    .search-wrapper .search-clear:hover { color: var(--text-primary); }
    .scroll-top-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-bg); border: 1px solid var(--accent);
      color: var(--accent); cursor: pointer; z-index: 100;
      display: none; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .scroll-top-btn.visible { display: flex; }
    .minimap {
      position: fixed; right: 0; top: 80px; bottom: 0;
      width: 40px; background: var(--surface-overlay);
      border-left: 1px solid var(--border);
      z-index: 50; overflow: hidden;
      display: none; flex-direction: column; padding: 4px 2px;
    }
    .minimap.visible { display: flex; }
    .minimap-bar {
      flex: 1; border-radius: 1px; margin-bottom: 1px;
      cursor: pointer; min-height: 2px; opacity: 0.6;
      transition: opacity 100ms;
    }
    .minimap-bar:hover { opacity: 1; }
    .minimap-bar.active { opacity: 1; outline: 1px solid var(--text); }
    .breadcrumbs {
      font-size: 0.75rem; color: var(--text-tertiary);
      padding: 4px 0 8px; display: flex; gap: 4px; align-items: center;
    }
    .breadcrumbs .sep { color: var(--text-tertiary); margin: 0 2px; }
    .breadcrumbs .crumb { cursor: pointer; color: var(--accent); }
    .breadcrumbs .crumb:hover { text-decoration: underline; }
    .breadcrumbs .crumb.current { color: var(--text-primary); cursor: default; }
    .breadcrumbs .crumb.current:hover { text-decoration: none; }
    body.minimap-visible { padding-right: 60px; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Session Dashboard</h1>
    <div id="status-bar" class="status-bar" aria-live="polite">Starting...</div>
  </header>
  <main>
    <div class="toolbar">
      <button class="btn btn-primary" id="refresh-btn" aria-label="Refresh sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <button class="btn btn-ghost" id="view-mode-toggle" aria-label="Toggle swimlane view"><svg class="icon" aria-hidden="true"><use href="#icon-columns"/></svg> Pipeline View</button>
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search sessions..." aria-label="Search sessions">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="search-clear" id="search-clear" role="button" tabindex="0" aria-label="Clear search">×</span>
      </div>
      <span style="font-size:0.8125rem;color:var(--text-secondary)" id="page-info" aria-live="polite"></span>
    </div>
    <div class="phase-filter" id="phase-filter" role="group" aria-label="Filter by phase">
      <div class="phase-filter-pills" id="phase-filter-pills"></div>
      <button class="btn btn-ghost phase-filter-clear" id="phase-filter-clear" style="display:none">Clear filters</button>
    </div>
    <div id="health-board">
      <div class="health-skeleton">
        <div class="skeleton-summary"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>
