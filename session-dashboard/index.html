  <script type="module">
    const status = document.getElementById('status-bar');
    const listEl = document.getElementById('session-list');
    const pageInfo = document.getElementById('page-info');
    const pageCount = document.getElementById('page-count');
    const modal = document.getElementById('raw-modal');
    const modalContent = document.getElementById('raw-modal-content');
    const healthBoardEl = document.getElementById('health-board');
    const reviewsContent = document.getElementById('reviews-content');
    const reviewsInfo = document.getElementById('reviews-info') || { textContent: '' };
    let analyticsData = null;
    let trendChartInstance = null;
    const reviewsTabEl = document.getElementById('reviews-tab');
    const sessionsTabEl = document.getElementById('sessions-tab');
    const PAGE_SIZE = 50;
    let offset = 0, total = 0, sessions = [];
    let _loading = false;
    let activePhases = new Set();
    let activeChainId = null;
    let searchQuery = '';
    let viewMode = 'list';

    const PHASES = {
      'ce-ideate':       { id: 'ideate',      color: 'var(--phase-ideate)',       icon: 'lightbulb',      label: 'Ideation' },
      'ce-brainstorm':   { id: 'brainstorm',  color: 'var(--phase-brainstorm)',   icon: 'message-square', label: 'Brainstorm' },
      'ce-plan':         { id: 'plan',        color: 'var(--phase-plan)',         icon: 'file-text',      label: 'Plan' },
      'ce-work':         { id: 'work',        color: 'var(--phase-work)',         icon: 'code',           label: 'Work' },
      'ce-code-review':  { id: 'code-review', color: 'var(--phase-code-review)',  icon: 'search',         label: 'Code Review' },
      'ce-doc-review':   { id: 'doc-review',  color: 'var(--phase-doc-review)',   icon: 'clipboard',      label: 'Doc Review' },
    };
    const PHASE_OTHER = { id: 'other', color: 'var(--phase-other)', icon: 'help-circle', label: 'Other' };

    function getPhase(agentType) {
      if (!agentType) return PHASE_OTHER;
      const raw = String(agentType).trim().toLowerCase().replace(/\s*:\s*/g, ':').replace(/\s*-\s*/g, '-');
      const match = raw.match(/(?:compound-engineering:)?(ce-\w+)/);
      if (!match) return PHASE_OTHER;
      return PHASES[match[1]] || PHASE_OTHER;
    }
    function fmtDate(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString([], {month:'short',day:'numeric'});
      } catch { return ''; }
    }

    // ── Tab switching ────────────────────────────────────────────────

    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanels = {
      sessions: document.getElementById('tab-sessions'),
      reviews: document.getElementById('tab-reviews'),
    };
    let activeTab = 'sessions';
    let reviewsLoaded = false;

    function switchTab(tab) {
      if (tab === activeTab) return;
      activeTab = tab;
      for (const btn of tabBtns) {
        const isActive = btn.dataset.tab === tab;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', isActive);
      }
      for (const [key, panel] of Object.entries(tabPanels)) {
        panel.classList.toggle('active', key === tab);
      }
      if (tab === 'reviews' && !reviewsLoaded) {
        reviewsLoaded = true;
        loadReviews();
      }
    }

    for (const btn of tabBtns) {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    }

    // ── Session list ─────────────────────────────────────────────────

    function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
    function svgIcon(name) { return `<svg class="icon" aria-hidden="true"><use href="#icon-${name}"/></svg>`; }

    // Map compound-engineering agent types to distinct SVG icons
    function getSubagentIcon(agentType) {
      const t = (agentType || '').toLowerCase();
      if (t.includes('security') || t.includes('adversarial') || t.includes('correctness')) return 'shield';
      if (t.includes('testing') || t.includes('reliability')) return 'zap';
      if (t.includes('performance')) return 'zap';
      if (t.includes('maintainability') || t.includes('project-standard')) return 'wrench';
      if (t.includes('design') || t.includes('lens') || t.includes('product')) return 'eye';
      if (t.includes('kieran') || t.includes('swift') || t.includes('ios') || t.includes('julik')) return 'code';
      if (t.includes('scope') || t.includes('feasibility') || t.includes('coherence')) return 'users';
      if (t.includes('api') || t.includes('contract') || t.includes('data')) return 'file-text';
      if (t.includes('deployment') || t.includes('schema') || t.includes('migration')) return 'clipboard';
      if (t.includes('learnings') || t.includes('research') || t.includes('repo')) return 'folder';
      if (t.includes('history') || t.includes('git')) return 'branch';
      if (t.includes('dhh') || t.includes('rails')) return 'code';
      if (t.includes('ideate') || t.includes('brainstorm')) return 'lightbulb';
      if (t.includes('plan')) return 'file-text';
      if (t.includes('doc-review')) return 'clipboard';
      if (t.includes('code-review')) return 'search';
      return 'bot';
    }

    const artifactsCache = new Map();
    let activePreview = null;

    function typeBadge(path) {
      if (path.startsWith('docs/plans/')) return 'plan';
      if (path.startsWith('docs/brainstorms/')) return 'req';
      if (path.startsWith('docs/ideation/')) return 'idea';
      if (path.startsWith('docs/solutions/')) return 'sol';
      if (path.startsWith('docs/hardware/')) return 'hw';
      if (path.startsWith('docs/reviews/')) return 'review';
      if (path.startsWith('docs/fixes/')) return 'fix';
      if (path.startsWith('docs/designs/')) return 'design';
      if (path.startsWith('docs/reports/')) return 'report';
      if (path.startsWith('docs/polish/')) return 'polish';
      if (path.startsWith('docs/work/')) return 'work';
      return 'doc';
    }

    function typeLabel(b) {
      const m = {plan:'plan', req:'req', idea:'idea', sol:'sol', hw:'hw', doc:'doc', review:'review', fix:'fix', design:'design', report:'report', polish:'polish', work:'work'};
      return m[b] || b;
    }

    function renderMarkdown(text) {
      const escaped = esc(text);
      let html = escaped;
      // fenced code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const c = esc(code);
        return `<pre><code${lang ? ` class="lang-${esc(lang)}"` : ''}>${c}</code></pre>`;
      });
      // inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // blockquote
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // horizontal rules
      html = html.replace(/^---$/gm, '<hr>');
      // bold/italic
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      // unordered lists
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
      // ordered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => m.includes('<ul>') ? m : '<ol>' + m + '</ol>');
      // paragraphs
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';
      // clean empty paragraphs
      html = html.replace(/<p>\s*<\/p>/g, '');
      return html;
    }

    async function fetchArtifacts(sessionId) {
      if (artifactsCache.has(sessionId)) return artifactsCache.get(sessionId);
      try {
        const res = await fetch(`/api/session/${sessionId}/artifacts`);
        if (!res.ok) return [];
        const data = await res.json();
        artifactsCache.set(sessionId, data);
        return data;
      } catch { return []; }
    }

    async function previewArtifact(path, rowEl) {
      if (activePreview && activePreview.row === rowEl && activePreview.path === path) {
        closePreview(activePreview);
        return;
      }
      if (activePreview) closePreview(activePreview);
      const existing = rowEl.querySelector('.artifact-preview');
      if (existing) existing.remove();
      const preview = document.createElement('div');
      preview.className = 'artifact-preview';
      preview.innerHTML = '<div class="preview-loading">Loading...</div>';
      rowEl.appendChild(preview);
      activePreview = { row: rowEl, path, el: preview, close: () => closePreview(activePreview) };
      try {
        const res = await fetch(`/api/artifact-content?path=${encodeURIComponent(path)}`);
        if (!res.ok) {
          preview.innerHTML = `<div class="preview-error">Could not load preview (${res.status})</div>`;
          return;
        }
        const data = await res.json();
        const rendered = renderMarkdown(data.content || '');
        preview.innerHTML = `
          <div class="preview-header">
            <span>${esc(path.split('/').pop())}</span>
            <button class="preview-close" aria-label="Close preview">${svgIcon('x')}</button>
          </div>
          <div class="preview-body">${rendered}</div>
        `;
        preview.querySelector('.preview-close').onclick = (e) => { e.stopPropagation(); closePreview(activePreview); };
      } catch(e) {
        preview.innerHTML = `<div class="preview-error">Could not load preview: ${esc(e.message)}</div>`;
      }
    }

    function closePreview(pv) {
      if (!pv) return;
      if (pv.el && pv.el.parentNode) pv.el.remove();
      if (activePreview === pv) activePreview = null;
    }

    function fmtDur(ms) {
      if (!ms || ms < 0) return '';
      const s = Math.round(ms / 1000);
      if (s < 60) return `${s}s`;
      if (s < 3600) return `${Math.round(s / 60)}m`;
      return `${(s / 3600).toFixed(1)}h`;
    }
    function fmtTime(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return '';
        const diff = Date.now() - d;
        if (diff < 864e5) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        if (diff < 6048e5) return d.toLocaleDateString([], {weekday:'short',hour:'2-digit',minute:'2-digit'});
        return d.toLocaleDateString([], {month:'short',day:'numeric'});
      } catch { return ''; }
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      if (diff < 0) return 'just now';
      const s = Math.round(diff / 1000);
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.round(s / 60)}m ago`;
      if (s < 86400) return `${Math.round(s / 3600)}h ago`;
      return `${Math.round(s / 86400)}d ago`;
    }

    function derivePipelineHealth(sessions) {
      const groups = new Map();
      for (const s of sessions) {
        const project = s.project || '(unknown)';
        if (!groups.has(project)) groups.set(project, []);
        groups.get(project).push(s);
      }

      const pipelines = [];
      for (const [project, projectSessions] of groups) {
        const sorted = [...projectSessions].sort((a, b) => {
          const ta = a.startedAt ? new Date(a.startedAt).getTime() : 0;
          const tb = b.startedAt ? new Date(b.startedAt).getTime() : 0;
          return tb - ta;
        });
        const latest = sorted[0];

        let phase = 'active';
        if (latest.agentType) {
          const parts = latest.agentType.split(':');
          if (parts.length > 1) phase = parts[parts.length - 1];
        }

        let status = 'active';
        let stalenessTs = null;

        if (latest.blockedReason || latest.dependsOn) {
          status = 'blocked';
        }

        if (status === 'active') {
          if (latest.duration && latest.startedAt) {
            const started = new Date(latest.startedAt).getTime();
            if (started + latest.duration < Date.now()) {
              status = 'idle';
              stalenessTs = started + latest.duration;
            }
          }
        }

        if (status === 'active') {
          const lastMsg = latest.lastMessageTimestamp || latest.startedAt;
          if (lastMsg) {
            stalenessTs = new Date(lastMsg).getTime();
            if (Date.now() - stalenessTs > STALL_THRESHOLD_MS) {
              status = 'stalled';
            }
          }
        }

        const stalenessText = stalenessTs ? timeAgo(stalenessTs) : '—';

        pipelines.push({
          project,
          phase,
          status,
          subAgentCount: latest.subAgentCount || 0,
          latestSession: latest,
          stalenessText,
          stalenessTs,
        });
      }

      pipelines.sort((a, b) => {
        const order = { stalled: 0, active: 1, blocked: 2, idle: 3 };
        return (order[a.status] ?? 4) - (order[b.status] ?? 4);
      });

      const summary = { active: 0, stalled: 0, idle: 0, blocked: 0 };
      for (const p of pipelines) summary[p.status]++;

      return { pipelines, summary };
    }

    function renderHealthBoard(data) {
      healthData = data;
      firstHealthFetchDone = true;

      const { pipelines, summary } = data;
      const total = pipelines.length;

      let html = '<div class="health-board">';
      html += '<div class="health-error-banner"></div>';

      if (total === 0) {
        html += '<div class="health-summary">0 pipelines active</div>';
        html += '<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:0.8125rem">No pipeline activity</div>';
      } else {
        const parts = [];
        if (summary.active) parts.push(`<span class="count count-active">${summary.active} active</span>`);
        if (summary.stalled) parts.push(`<span class="count count-stalled">${summary.stalled} stalled</span>`);
        if (summary.idle) parts.push(`<span class="count count-idle">${summary.idle} idle</span>`);
        if (summary.blocked) parts.push(`<span class="count count-blocked">${summary.blocked} blocked</span>`);
        html += `<div class="health-summary">${total} pipeline${total !== 1 ? 's' : ''} \u2014 ${parts.join(', ')}</div>`;

        html += '<div class="health-pipelines">';
        for (const p of pipelines) {
          const selected = currentFilter && currentFilter.project === p.project;
          html += `<div class="pipeline-row status-${p.status}${selected ? ' selected' : ''}" data-project="${esc(p.project)}" tabindex="0" role="button" aria-label="Filter by ${esc(p.project)}">
            <span class="status-dot"></span>
            <span class="pipeline-name">${esc(p.project)}</span>
            <span class="phase-badge">${esc(p.phase)}</span>
            <span class="status-label">${p.status}</span>
            ${p.subAgentCount > 0 ? `<span class="agent-count">${svgIcon('bot')}${p.subAgentCount}</span>` : ''}
            <span class="staleness-text">${esc(p.stalenessText)}</span>
          </div>`;
        }
        html += '</div>';
      }

      html += '</div>';
      healthBoardEl.innerHTML = html;

      const rows = healthBoardEl.querySelectorAll('.pipeline-row');
      for (const row of rows) {
        row.addEventListener('click', () => onPipelineRowClick(row.dataset.project));
        row.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPipelineRowClick(row.dataset.project); }
        });
      }
    }

    function renderHealthBoardSkeleton() {
      healthBoardEl.innerHTML = '<div class="health-skeleton"><div class="skeleton-summary"></div><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>';
    }

    function showHealthBoardError() {
      if (firstHealthFetchDone) {
        const board = healthBoardEl.querySelector('.health-board');
        if (board) {
          const banner = board.querySelector('.health-error-banner');
          if (banner) {
            banner.classList.add('visible');
            banner.textContent = 'Status board unavailable \u2014 retrying...';
          }
        }
      } else {
        healthBoardEl.innerHTML = '<div style="padding:24px 12px;text-align:center;color:var(--text-tertiary);font-size:0.8125rem">Status board unavailable</div>';
      }
    }

    function hideHealthBoardError() {
      const banner = healthBoardEl.querySelector('.health-error-banner');
      if (banner) banner.classList.remove('visible');
    }

    function updateStalenessTexts() {
      if (!healthData) return;
      const now = Date.now();
      const rows = healthBoardEl.querySelectorAll('.pipeline-row');
      for (const row of rows) {
        const project = row.dataset.project;
        const pipeline = healthData.pipelines.find(p => p.project === project);
        if (!pipeline) continue;

        const stalenessEl = row.querySelector('.staleness-text');
        if (!stalenessEl) continue;

        if (pipeline.status === 'active' && pipeline.stalenessTs) {
          if (now - pipeline.stalenessTs > STALL_THRESHOLD_MS) {
            pipeline.status = 'stalled';
            row.classList.remove('status-active');
            row.classList.add('status-stalled');
            const label = row.querySelector('.status-label');
            if (label) label.textContent = 'stalled';
          }
        }

        if (pipeline.stalenessTs) {
          stalenessEl.textContent = timeAgo(pipeline.stalenessTs);
        }
      }
    }

    function onPipelineRowClick(project) {
      if (currentFilter && currentFilter.project === project) return;
      currentFilter = { project };
      renderHealthBoard(healthData);
      applyFilterToSessionList();
    }

    function clearFilter() {
      currentFilter = null;
      activeChainId = null;
      document.querySelectorAll('.chain-row').forEach(r => r.classList.remove('active-filter'));
      if (healthData) renderHealthBoard(healthData);
      renderList();
      updateFilterIndicator();
    }

    function applyFilterToSessionList() {
      renderList();
      updateFilterIndicator();
    }

    function updateFilterIndicator() {
      const toolbar = document.querySelector('.toolbar');
      if (!toolbar) return;
      let indicator = toolbar.querySelector('.filter-indicator');
      if (currentFilter) {
        if (!indicator) {
          indicator = document.createElement('span');
          indicator.className = 'filter-indicator';
          toolbar.appendChild(indicator);
        }
        indicator.innerHTML = `Showing: <strong>${esc(currentFilter.project)}</strong> <button class="btn btn-ghost" id="clear-filter-btn" style="padding:2px 6px;min-height:auto;font-size:0.75rem" aria-label="Clear filter">${svgIcon('x')} Clear</button>`;
        const clearBtn = indicator.querySelector('#clear-filter-btn');
        if (clearBtn) clearBtn.onclick = (e) => { e.stopPropagation(); clearFilter(); };
      } else {
        if (indicator) indicator.remove();
      }
    }

    function renderBreadcrumbs() {
      let bc = document.getElementById('breadcrumbs');
      if (!bc) {
        bc = document.createElement('div');
        bc.id = 'breadcrumbs';
        bc.className = 'breadcrumbs';
        listEl.parentNode.insertBefore(bc, listEl);
      }
      let parts = ['<span class="crumb current">Home</span>'];
      if (currentFilter?.project) {
        parts = [`<span class="crumb" onclick="clearFilter()">Home</span> <span class="sep">›</span> <span class="crumb current">${esc(currentFilter.project)}</span>`];
      }
      if (activeChainId) {
        parts = [`<span class="crumb" onclick="clearFilter()">Home</span> <span class="sep">›</span> <span class="crumb current">Chain ${esc(activeChainId.substring(0, 8))}</span>`];
      }
      bc.innerHTML = parts.join('');
    }

    function renderMinimap(sessions) {
      let mm = document.getElementById('minimap');
      if (!mm) {
        mm = document.createElement('div');
        mm.id = 'minimap';
        mm.className = 'minimap';
        document.body.appendChild(mm);
      }
      if (sessions.length < 10) { mm.classList.remove('visible'); document.body.classList.remove('minimap-visible'); return; }
      mm.classList.add('visible');
      document.body.classList.add('minimap-visible');
      mm.innerHTML = '';
      for (let i = 0; i < sessions.length; i++) {
        const s = sessions[i];
        const phase = getPhase(s.agentType);
        const bar = document.createElement('div');
        bar.className = 'minimap-bar';
        bar.style.background = phase.color;
        bar.title = s.summary ? s.summary.substring(0, 60) : '';
        bar.dataset.index = i;
        bar.addEventListener('click', () => {
          const cards = document.querySelectorAll('.session-card');
          if (cards[i]) cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        mm.appendChild(bar);
      }
    }

    async function fetchPage(reset) {
      if (reset) { offset = 0; sessions = []; listEl.innerHTML = ''; }
      status.textContent = 'Loading...';
      try {
        const res = await fetch(`/api/sessions?limit=${PAGE_SIZE}&offset=${offset}`);
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        const data = await res.json();
        sessions = reset ? data.sessions : [...sessions, ...data.sessions];
        total = data.total;
        renderList();
        pageInfo.textContent = `${sessions.length} of ${total}`;
        status.textContent = 'Ready';
      } catch(e) {
        status.textContent = 'Error: ' + e.message;
        if (!sessions.length && listEl.children.length === 0) {
          listEl.className = 'empty-state';
          listEl.innerHTML = `<h2>Cannot reach server</h2><p>Make sure <code>python3 server.py</code> is running in the session-dashboard directory.</p><p style="margin-top:12px"><button class="btn btn-primary" onclick="location.reload()">Retry</button></p>`;
        }
      }
    }

    function renderList() {
      let displaySessions = sessions;
      if (activeChainId) {
        displaySessions = sessions.filter(s => s.chainId === activeChainId);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        displaySessions = displaySessions.filter(s => {
          const fields = [s.summary, s.project, s.branch, s.agentType, s.description];
          for (const sa of s.subAgents || []) {
            if (sa.description) fields.push(sa.description);
          }
          return fields.some(f => f && f.toLowerCase().includes(q));
        });
      }
      if (!displaySessions.length) {
        listEl.className = 'empty-state';
        listEl.innerHTML = activeChainId
          ? '<h2>No sessions in this chain</h2><p>Try loading more sessions or select a different chain.</p>'
          : '<h2>No sessions found</h2><p>Check that ~/.claude/projects/ has session data.</p>';
        return;
      }
      if (viewMode === 'swimlane') {
        listEl.className = 'swimlane-view';
        listEl.innerHTML = '';
        const phases = [...Object.values(PHASES), PHASE_OTHER];
        for (const phase of phases) {
          const phaseSessions = displaySessions.filter(s => getPhase(s.agentType).id === phase.id);
          const col = document.createElement('div');
          col.className = 'swimlane-column';
          col.innerHTML = `<div class="swimlane-header">${esc(phase.label)} <span class="count">(${phaseSessions.length})</span></div>`;
          for (const s of phaseSessions) {
            const card = renderCard(s);
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
            col.appendChild(card);
          }
          listEl.appendChild(col);
        }
      } else {
        listEl.className = 'session-list';
        listEl.innerHTML = '';
        let autoExpanded = false;
        for (const s of displaySessions) {
          try {
            const card = renderCard(s);
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
            if (!autoExpanded && s.subAgentCount > 0) {
              card.classList.add('expanded');
              const se = card.querySelector('.card-summary');
              if (se) { se.classList.remove('clamped'); se.classList.add('expanded'); }
              autoExpanded = true;
            }
            listEl.appendChild(card);
          } catch(e) {
            const err = document.createElement('div');
            err.className = 'session-card';
            err.textContent = `Error: ${s.id || '?'} — ${e.message}`;
            listEl.appendChild(err);
          }
        }
      if (!activeChainId && sessions.length < total) {
        listEl.appendChild(sentinel);
      }
      }
      renderFilterPills();
      applyPhaseFilter();
      renderBreadcrumbs();
      renderMinimap(displaySessions);
    }

    async function fetchChains() {
      try {
        const res = await fetch('/api/chains');
        if (!res.ok) return;
        const data = await res.json();
        chains = data.chains || [];
        renderChains();
      } catch(e) {
        // Silently degrade
      }
    }

    function renderChains() {
      const existing = document.querySelector('.chain-section');
      if (existing) existing.remove();
      if (!chains.length) return;

      const section = document.createElement('div');
      section.className = 'chain-section';

      for (const chain of chains) {
        const row = renderChainRow(chain);
        section.appendChild(row);
      }

      const list = document.getElementById('session-list');
      list.parentNode.insertBefore(section, list);
    }

    function renderChainRow(chain) {
      const row = document.createElement('div');
      row.className = 'chain-row';
      if (activeChainId === chain.id) row.classList.add('active-filter');
      row.dataset.chainId = chain.id;

      const topic = document.createElement('div');
      topic.className = 'chain-topic';
      topic.textContent = chain.label || chain.project || 'Untitled';
      topic.title = chain.label || '';
      row.appendChild(topic);

      const bar = document.createElement('div');
      bar.className = 'chain-bar';

      const phaseNames = ['ideation', 'brainstorm', 'plan', 'work', 'review'];
      const phaseLabels = ['Ideation', 'Brainstorm', 'Plan', 'Work', 'Review'];
      const phases = chain.phases || {};

      for (let i = 0; i < phaseNames.length; i++) {
        const name = phaseNames[i];
        const state = phases[name] || { status: 'pending' };
        const wrapper = renderPhaseDot(state, name, phaseLabels[i]);
        bar.appendChild(wrapper);
        if (i < phaseNames.length - 1) {
          const line = document.createElement('div');
          line.className = 'phase-line';
          if (state.status === 'completed' || state.status === 'active') {
            line.classList.add('completed-line');
          }
          bar.appendChild(line);
        }
      }

      row.appendChild(bar);

      if (chain.health && chain.health.length) {
        const healthEl = renderHealth(chain.health);
        row.appendChild(healthEl);
      }

      attachFilter(row, chain.id);

      return row;
    }

    function renderPhaseDot(state, phaseName, displayLabel) {
      const wrapper = document.createElement('div');
      wrapper.className = 'phase-dot-wrapper';

      const dot = document.createElement('div');
      dot.className = `phase-dot ${state.status}`;
      dot.setAttribute('aria-label', `${displayLabel}: ${state.status}`);

      wrapper.appendChild(dot);

      const label = document.createElement('div');
      label.className = 'phase-label';
      label.textContent = state.status === 'unknown' ? '?' : displayLabel;
      wrapper.appendChild(label);

      attachTooltip(wrapper, state, displayLabel);

      return wrapper;
    }

    function renderHealth(health) {
      const section = document.createElement('div');
      section.className = 'health-section';
      for (const h of health) {
        const el = document.createElement('div');
        el.className = h.type === 'broken' ? 'health-broken' : 'health-stalled';
        el.textContent = `${h.type === 'broken' ? '\u26A0' : '\u26A1'} ${h.message}`;
        section.appendChild(el);
      }
      return section;
    }

    function attachTooltip(wrapper, state, displayLabel) {
      const tooltip = document.createElement('div');
      tooltip.className = 'phase-tooltip';

      let content = '';
      if (state.sessionId) {
        const sid = state.sessionId.length > 12 ? state.sessionId.slice(0, 12) + '\u2026' : state.sessionId;
        const dur = state.duration ? fmtDur(state.duration) : '';
        const ts = state.startedAt ? fmtTime(state.startedAt) : '';
        content = `<div class="phase-tooltip-label">${esc(displayLabel)}</div>`;
        content += `<div class="phase-tooltip-meta">${esc(sid)}</div>`;
        if (dur) content += `<div class="phase-tooltip-meta">${dur}</div>`;
        if (ts) content += `<div class="phase-tooltip-meta">${ts}</div>`;
      } else {
        content = `<div class="phase-tooltip-label">${esc(displayLabel)}</div><div class="phase-tooltip-meta">No session</div>`;
      }
      tooltip.innerHTML = content;
      wrapper.appendChild(tooltip);

      wrapper.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') tooltip.style.opacity = '0';
      });
    }

    function attachFilter(row, chainId) {
      row.addEventListener('click', () => {
        if (activeChainId === chainId) {
          clearFilter();
        } else {
          activeChainId = chainId;
          applyFilter();
        }
      });
    }

    function applyFilter() {
      document.querySelectorAll('.chain-row').forEach(r => {
        r.classList.toggle('active-filter', r.dataset.chainId === activeChainId);
      });
      let clearBtn = document.getElementById('clear-filter-btn');
      if (!clearBtn) {
        clearBtn = document.createElement('button');
        clearBtn.id = 'clear-filter-btn';
        clearBtn.className = 'btn btn-ghost';
        clearBtn.innerHTML = `${svgIcon('x')} Clear filter`;
        clearBtn.onclick = clearFilter;
        document.querySelector('.toolbar').appendChild(clearBtn);
      }
      renderList();
      const firstMatch = document.querySelector(`.session-card[data-chain-id="${activeChainId}"]`);
      if (firstMatch) {
        setTimeout(() => firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
      }
    }

    async function viewRaw(sid) {
      modalContent.innerHTML = `<p style="color:var(--text-secondary);text-align:center;padding:60px">Loading...</p>`;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('refresh-btn').focus();
      try {
        const res = await fetch(`/api/session/${sid}`);
        if (!res.ok) throw new Error('Session not found');
        const data = await res.json();
        const msgs = data.messages || [];
        let html = `<div class="modal-header">
          <div><strong>${esc(data.project || sid)}</strong>${data.branch ? ` <span style="color:var(--text-secondary)">on ${esc(data.branch)}</span>` : ''}</div>
          <button class="btn btn-ghost" onclick="closeModal()" aria-label="Close">${svgIcon('x')}</button>
        </div>`;
        for (const m of msgs) {
          const msg = m.message || m;
          const blocks = Array.isArray(msg?.content) ? msg.content : [{type:'text', text: typeof msg === 'string' ? msg : JSON.stringify(msg)}];
          for (const block of blocks) {
            let label = msg.role || m.type || '?';
            let text = '';
            const bt = block.type || 'unknown';
            if (bt === 'text') text = block.text || '';
            else if (bt === 'tool_use') { label = `tool: ${block.name || '?'}`; text = JSON.stringify(block.input || {}).slice(0, 1000); }
            else if (bt === 'tool_result') {
              label = 'result';
              const c = block.content;
              text = typeof c === 'string' ? c : (Array.isArray(c) ? c.map(x => x.text || '').join('\n') : JSON.stringify(c || {}));
            } else text = JSON.stringify(block).slice(0, 1000);
            if (!text && bt === 'unknown') continue;
            const cls = label.startsWith('user') ? 'user' : label.startsWith('assistant') ? 'assistant' : label.startsWith('tool') ? 'tool' : label.startsWith('result') ? 'result' : '';
            html += `<div class="msg-block ${cls}"><div class="msg-label">${esc(label)}</div><pre class="msg-content">${esc(text.slice(0, 3000))}</pre></div>`;
          }
        }
        html += `<p style="color:var(--text-secondary);text-align:center;padding:20px">${msgs.length} messages</p>`;
        modalContent.innerHTML = html;
      } catch(e) {
        modalContent.innerHTML = `<p style="color:var(--error);text-align:center;padding:60px">${esc(e.message)}</p>`;
      }
    }

    function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }
    window.closeModal = closeModal;
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

    function createSubagentRow(sa) {
      const row = document.createElement('div');
      row.className = 'subagent-row';
      row.setAttribute('tabindex', '0');
      row.setAttribute('role', 'button');
      row.setAttribute('aria-label', `View sub-agent: ${sa.description || sa.agentType || sa.id}`);

      let statusHtml = '';
      if (sa.status === 'passed') {
        statusHtml = '<span class="pass-badge passed">✓</span>';
      } else if (sa.status === 'failed') {
        statusHtml = '<span class="pass-badge failed">✗</span>';
      }

      const desc = sa.description || sa.agentType || 'sub-agent';
      const dur = fmtDur(sa.duration);
      const agentType = sa.agentType || '';
      const iconName = getSubagentIcon(agentType);

      row.innerHTML = `
        <span class="subagent-icon" title="${esc(agentType || 'agent')}">${svgIcon(iconName)}</span>
        <span class="subagent-desc" title="${esc(desc)}">${esc(desc.substring(0, 80))}</span>
        <span class="subagent-dur">${dur ? esc(dur) : ''}</span>
        ${statusHtml}
      `;

      row.onclick = (e) => { e.stopPropagation(); viewRaw(sa.id); };
      row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); viewRaw(sa.id); } });

      return row;
    }

    function renderCard(s) {
      let summary = s.summary || 'Session';
      const dur = fmtDur(s.duration);
      const ts = fmtTime(s.startedAt);
      const phase = getPhase(s.agentType);
      const latest = s.latestAgentDate;
      if (latest) summary += ` \u2014 latest: ${fmtTime(latest)}`;

      const card = document.createElement('div');
      card.className = 'session-card' + (s.isSynthetic ? ' card-synthetic' : '');
      card.dataset.phase = phase.id;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `${summary}, ${s.project || ''}${s.branch ? ', ' + s.branch : ''}`);
      card.dataset.chainId = s.chainId || '';

      const summaryEl = document.createElement('div');
      summaryEl.className = 'card-summary clamped';
      summaryEl.textContent = summary;

      const meta = document.createElement('div');
      meta.className = 'card-meta';
      const items = [
        `<span class="card-meta-item">${svgIcon(phase.icon)}${esc(phase.label)}</span>`,
        dur ? `<span class="card-meta-item" title="Duration ${dur}">${svgIcon('clock')}${dur}</span>` : '',
        s.subAgentCount > 0 ? `<span class="card-meta-item subagent-count-badge" title="${s.subAgentCount} sub-agents">${svgIcon('bot')}${s.subAgentCount}</span>` : '',
        s.branch ? `<span class="card-meta-item" title="Branch: ${esc(s.branch)}">${svgIcon('branch')}${esc(s.branch)}</span>` : '',
        ts ? `<span class="card-meta-item" title="Started: ${s.startedAt || 'unknown'}">${svgIcon('calendar')}${ts}</span>` : '',
        s.project ? `<span class="tag tag-project">${esc(s.project)}</span>` : '',
        s.agentType ? `<span class="tag tag-type tag-type-deemphasized">${esc(s.agentType.split(':').pop())}</span>` : '',
        s.isSubagent ? '<span class="tag tag-subagent">sub-agent</span>' : '',
        s.isSynthetic ? '<span class="tag orphan-tag">orphan</span>' : '',
      ];
      meta.innerHTML = items.filter(Boolean).join('');

      const detail = document.createElement('div');
      detail.className = 'card-detail';
      const detailSummary = document.createElement('div');
      detailSummary.style.cssText = 'font-size:0.875rem;color:var(--text-secondary);margin-bottom:8px';
      detailSummary.textContent = summary;
      detail.appendChild(detailSummary);
      if (s.agentType) {
        const atEl = document.createElement('div');
        atEl.style.cssText = 'font-size:0.75rem;color:var(--text-tertiary);margin:4px 0';
        atEl.innerHTML = `${svgIcon('folder')} ${esc(s.agentType)}`;
        detail.appendChild(atEl);
      }
      if (s.cwd) {
        const cwdEl = document.createElement('div');
        cwdEl.style.cssText = 'font-size:0.75rem;color:var(--text-tertiary);margin:4px 0';
        cwdEl.innerHTML = `${svgIcon('file')} ${esc(s.cwd)}`;
        detail.appendChild(cwdEl);
      }
      if (s.isSynthetic) {
        const orphanEl = document.createElement('div');
        orphanEl.style.cssText = 'font-size:0.75rem;color:var(--warning);margin:4px 0';
        orphanEl.textContent = '⚠ Orphan sub-agents';
        detail.appendChild(orphanEl);
      }
      const phaseDetail = renderPhaseDetail(s, phase);
      if (phaseDetail) detail.appendChild(phaseDetail);

      // Sub-agent rows
      if (s.subAgents && s.subAgents.length > 0) {
        const rowsContainer = document.createElement('div');
        rowsContainer.className = 'subagent-rows';
        const showAll = s.subAgents.length > 20;
        const visible = showAll ? s.subAgents.slice(0, 20) : s.subAgents;
        for (const sa of visible) rowsContainer.appendChild(createSubagentRow(sa));
        if (showAll) {
          const btn = document.createElement('button');
          btn.className = 'btn btn-ghost subagent-truncated';
          btn.textContent = `Show all ${s.subAgents.length} sub-agents`;
          btn.onclick = (e) => { e.stopPropagation(); btn.remove(); for (const sa of s.subAgents.slice(20)) rowsContainer.appendChild(createSubagentRow(sa)); };
          rowsContainer.appendChild(btn);
        }
        detail.appendChild(rowsContainer);
      }

      const rawBtn = document.createElement('button');
      rawBtn.className = 'btn btn-ghost';
      rawBtn.style.cssText = 'margin-top:8px;font-size:0.8125rem';
      rawBtn.setAttribute('aria-label', `View raw conversation for ${esc(summary)}`);
      rawBtn.innerHTML = `${svgIcon('file')} View raw conversation`;
      detail.appendChild(rawBtn);

      card.appendChild(summaryEl);
      card.appendChild(meta);
      card.appendChild(detail);

      let expanded = false;
      card.onclick = () => {
        expanded = !expanded;
        card.classList.toggle('expanded', expanded);
        summaryEl.classList.toggle('clamped', !expanded);
        summaryEl.classList.toggle('expanded', expanded);
        if (expanded) renderArtifacts(s);
      };

      rawBtn.onclick = (e) => { e.stopPropagation(); viewRaw(s.id); };

      return card;
    }

    function renderPhaseDetail(s, phase) {
      const el = document.createElement('div');
      el.style.cssText = 'font-size:0.8125rem;color:var(--text-secondary);margin:6px 0';
      let text = '';
      switch (phase.id) {
        case 'ideate':
          text = s.frameCount != null ? `${s.frameCount} divergent frames` : '\u2014';
          break;
        case 'brainstorm':
          text = s.requirementsCount != null ? `${s.requirementsCount} requirements` : '\u2014';
          break;
        case 'plan':
          text = s.planUnits != null ? `${s.planUnits} implementation units` : '\u2014';
          break;
        case 'work':
          text = s.filesChanged != null ? `${s.filesChanged} files changed` : '\u2014';
          break;
        case 'code-review':
          if (s.findings && (s.findings.critical != null || s.findings.major != null || s.findings.minor != null)) {
            const parts = [];
            if (s.findings.critical) parts.push(`${s.findings.critical} critical`);
            if (s.findings.major) parts.push(`${s.findings.major} major`);
            if (s.findings.minor) parts.push(`${s.findings.minor} minor`);
            text = parts.join(', ');
          } else if (s.criticalFindings != null || s.majorFindings != null || s.minorFindings != null) {
            const parts = [];
            if (s.criticalFindings) parts.push(`${s.criticalFindings} critical`);
            if (s.majorFindings) parts.push(`${s.majorFindings} major`);
            if (s.minorFindings) parts.push(`${s.minorFindings} minor`);
            text = parts.join(', ');
          } else {
            text = '\u2014';
          }
          break;
        case 'doc-review':
          if (s.consensusScore != null) {
            text = `${s.consensusScore}/5 reviewers agree`;
          } else if (s.approvedBy != null) {
            text = `${s.approvedBy} approvals`;
          } else {
            text = '\u2014';
          }
          break;
        default:
          return null;
      }
      el.innerHTML = `${svgIcon(phase.icon)} ${esc(text)}`;
      return el;
    }

    function renderFilterPills() {
      const container = document.getElementById('phase-filter-pills');
      const clearBtn = document.getElementById('phase-filter-clear');
      if (!container) return;
      const counts = {};
      for (const s of sessions) {
        const p = getPhase(s.agentType);
        counts[p.id] = (counts[p.id] || 0) + 1;
      }
      const visiblePhases = Object.values(PHASES).filter(p => counts[p.id] > 0);
      if (counts['other'] > 0) visiblePhases.push(PHASE_OTHER);
      container.innerHTML = '';
      for (const phase of visiblePhases) {
        const pill = document.createElement('button');
        pill.className = 'phase-pill';
        if (activePhases.size > 0 && !activePhases.has(phase.id)) {
          pill.classList.add('inactive');
        }
        const dot = document.createElement('span');
        dot.className = 'pill-dot';
        dot.style.background = `var(--phase-${phase.id})`;
        pill.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = phase.label;
        pill.appendChild(label);
        const count = document.createElement('span');
        count.className = 'pill-count';
        count.textContent = `(${counts[phase.id]})`;
        pill.appendChild(count);
        pill.addEventListener('click', () => {
          if (activePhases.size === 0) {
            activePhases = new Set(Object.keys(PHASES).map(k => PHASES[k].id));
            activePhases.add('other');
            activePhases.delete(phase.id);
          } else {
            if (activePhases.has(phase.id)) {
              activePhases.delete(phase.id);
              if (activePhases.size === 0) activePhases = new Set();
            } else {
              activePhases.add(phase.id);
            }
          }
          applyPhaseFilter();
        });
        container.appendChild(pill);
      }
      clearBtn.style.display = activePhases.size > 0 && activePhases.size < (Object.keys(PHASES).length + (counts['other'] > 0 ? 1 : 0)) ? '' : 'none';
    }

    function applyPhaseFilter() {
      const allShown = activePhases.size === 0;
      let hasVisible = false;
      for (const card of listEl.querySelectorAll('.session-card')) {
        const phase = card.dataset.phase;
        const visible = allShown || activePhases.has(phase);
        card.style.display = visible ? '' : 'none';
        if (visible) hasVisible = true;
      }
      const existingEmpty = document.getElementById('phase-filter-empty');
      if (!hasVisible) {
        if (!existingEmpty) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.id = 'phase-filter-empty';
          empty.innerHTML = '<h2>No sessions match the active filters</h2><p><button class="btn btn-ghost" id="phase-filter-show-all">Show all sessions</button></p>';
          listEl.insertBefore(empty, listEl.firstChild);
          document.getElementById('phase-filter-show-all')?.addEventListener('click', () => {
            activePhases = new Set();
            renderFilterPills();
            applyPhaseFilter();
          });
        }
      } else if (existingEmpty) {
        existingEmpty.remove();
      }
      renderFilterPills();
    }

    function searchSessions(query) {
      if (!query) return sessions.slice();
      const q = query.toLowerCase();
      return sessions.filter(s => {
        const fields = [s.summary, s.project, s.branch, s.agentType, s.description];
        for (const sa of s.subAgents || []) {
          if (sa.description) fields.push(sa.description);
        }
        return fields.some(f => f && f.toLowerCase().includes(q));
      });
    }

    function applySearch() {
      const input = document.getElementById('search-input');
      const clear = document.getElementById('search-clear');
      searchQuery = input.value;
      clear.classList.toggle('visible', searchQuery.length > 0);
      renderList();
    }

    document.getElementById('refresh-btn').onclick = () => fetchPage(true);
    document.getElementById('view-mode-toggle')?.addEventListener('click', () => {
      viewMode = viewMode === 'list' ? 'swimlane' : 'list';
      document.getElementById('view-mode-toggle').innerHTML = `<svg class="icon" aria-hidden="true"><use href="#icon-columns"/></svg> ${viewMode === 'list' ? 'Pipeline View' : 'List View'}`;
      renderList();
    });
    document.getElementById('phase-filter-clear')?.addEventListener('click', () => {
      activePhases = new Set();
      renderFilterPills();
      applyPhaseFilter();
    });

    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', applySearch);
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      applySearch();
      searchInput.focus();
    });
    searchClear.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        searchInput.value = '';
        applySearch();
        searchInput.focus();
      }
    });

    // ── Keyboard shortcuts ──────────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
      const target = e.target;
      if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.contentEditable === 'true') return;

      const cards = Array.from(document.querySelectorAll('.session-card:not(.card-synthetic)'));
      const currentIdx = cards.findIndex(c => c.matches(':hover') || c.classList.contains('expanded'));

      switch (e.key) {
        case 'j':
        case 'ArrowDown':
          e.preventDefault();
          if (currentIdx < cards.length - 1) {
            cards[Math.max(0, currentIdx)].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            cards[Math.max(0, currentIdx)].focus();
          }
          break;
        case 'k':
        case 'ArrowUp':
          e.preventDefault();
          if (currentIdx > 0) {
            cards[currentIdx - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            cards[currentIdx - 1].focus();
          } else if (currentIdx === -1 && cards.length > 0) {
            cards[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            cards[0].focus();
          }
          break;
        case 'e':
        case 'Enter':
          if (currentIdx >= 0) cards[currentIdx].click();
          break;
        case '/':
          e.preventDefault();
          const searchInput = document.querySelector('.search-wrapper input');
          if (searchInput) searchInput.focus();
          break;
        case 'r':
          // Only when not in input, refresh
          if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
            document.getElementById('refresh-btn')?.click();
          }
          break;
      }
    });

    fetchPage(true);

    // Auto-refresh on tab visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        fetchPage(true);
        showRefreshToast();
        if (window._healthInterval) {
          clearInterval(window._healthInterval);
          window._healthInterval = setInterval(fetchHealthBoard, 15000);
        }
      }
    });

    function showRefreshToast() {
      let toast = document.getElementById('refresh-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'refresh-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = '\u21BB Updated';
      toast.className = 'toast-visible';
      clearTimeout(toast._hide);
      toast._hide = setTimeout(() => { toast.className = ''; }, 2000);
    }

    // ── Reviews tab ──────────────────────────────────────────────────

    async function loadReviews() {
      reviewsContent.innerHTML = '<div class="reviews-loading"><div class="spinner"></div><p>Loading analytics...</p></div>';
      reviewsInfo.textContent = 'Loading...';
      try {
        const res = await fetch('/api/analytics/reviewers');
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        analyticsData = await res.json();
        reviewsInfo.textContent = `${analyticsData.personas.length} personas, ${analyticsData.sessions.length} sessions`;
        renderReviews();
      } catch(e) {
        reviewsContent.innerHTML = `<div class="empty-state"><h2>Cannot load analytics</h2><p>${esc(e.message)}</p><p style="margin-top:12px"><button class="btn btn-primary" onclick="loadReviews()">Retry</button></p></div>`;
        reviewsInfo.textContent = 'Error';
      }
    }

    function renderReviews() {
      if (!analyticsData) return;
      const data = analyticsData;
      let html = '';

      // Pivot table
      html += '<section class="reviews-section"><h2>Findings Heatmap</h2>';
      html += renderPivotTable(data);
      html += '</section>';

      // Summary cards
      html += '<section class="reviews-section"><h2>Persona Summary</h2>';
      html += renderSummaryCards(data);
      html += '</section>';

      // Trend chart
      html += '<section class="reviews-section"><h2>Trend</h2>';
      html += '<div class="chart-container"><canvas id="trend-chart"></canvas></div>';
      html += '</section>';

      // Blind spots
      html += '<section class="reviews-section"><h2>Blind Spots</h2>';
      html += renderBlindSpots(data);
      html += '</section>';

      reviewsContent.innerHTML = html;

      if (data.trends && Object.keys(data.trends).length > 0) {
        renderTrendChart(data);
      }
    }

    function renderPivotTable(data) {
      const personas = data.personas || [];
      const sessions = data.sessions || [];
      const matrix = data.matrix || {};

      if (!sessions.length) {
        return '<div class="empty-state"><p>No review sessions found.</p></div>';
      }

      const maxCount = Math.max(1, ...Object.values(matrix).flatMap(
        row => Object.values(row).filter(v => typeof v === 'number' && v >= 0)
      ));

      const visibleSessions = sessions.slice(0, 30);

      let html = '<div class="pivot-wrapper"><table class="pivot-table"><thead><tr><th>Persona</th>';
      for (const s of visibleSessions) {
        html += `<th title="${esc(s.sessionId)}">${esc(fmtDate(s.startedAt))}</th>`;
      }
      html += '</tr></thead><tbody>';

      for (const p of personas) {
        const pk = p.agentType.replace('compound-engineering:', '');
        const row = matrix[pk] || {};
        html += `<tr><td><span class="tag tag-reviewer">${esc(p.displayName)}</span></td>`;
        for (const s of visibleSessions) {
          const val = row[s.sessionId];
          if (val === undefined || val === null) {
            html += `<td class="cell-empty">×</td>`;
          } else if (val === 0) {
            html += `<td class="cell-zero">•</td>`;
          } else {
            const alpha = 0.15 + 0.70 * (val / maxCount);
            const bg = `rgba(88,166,255,${alpha.toFixed(3)})`;
            const fontWeight = val > 0 ? 'font-weight:600' : '';
            html += `<td style="background:${bg};${fontWeight}" title="${esc(p.displayName)} in ${esc(fmtDate(s.startedAt))}: ${val} findings">${val}</td>`;
          }
        }
        html += '</tr>';
      }

      html += '</tbody></table></div>';
      return html;
    }

    function renderSummaryCards(data) {
      const personas = data.personas || [];
      if (!personas.length) {
        return '<div class="empty-state"><p>No persona data available.</p></div>';
      }

      let html = '<div class="cards-grid">';
      for (const p of personas) {
        const pk = p.agentType.replace('compound-engineering:', '');
        const trends = (data.trends || {})[pk] || [];
        const recent = trends.slice(-4);
        let trendArrow = '→';
        let trendClass = 'p-trend-flat';
        if (recent.length >= 4) {
          const current = recent.slice(-1)[0].findingCount;
          const priorAvg = (recent.slice(0, -1).reduce((s, t) => s + t.findingCount, 0)) / 3;
          if (current > priorAvg * 1.10) { trendArrow = '↑'; trendClass = 'p-trend-up'; }
          else if (current < priorAvg * 0.90) { trendArrow = '↓'; trendClass = 'p-trend-down'; }
        }

        const acceptRate = p.acceptanceRate !== null && p.acceptanceRate !== undefined
          ? `${Math.round(p.acceptanceRate * 100)}%`
          : '—';

        html += `<div class="persona-card">
          <div class="p-name">${esc(p.displayName)}</div>
          <div class="p-stat"><span>Total findings</span><span class="p-val">${p.totalFindings}</span></div>
          <div class="p-stat"><span>High severity</span><span class="p-val p-warn">${p.highSeverityCount}</span></div>
          <div class="p-stat"><span>Acceptance</span><span class="p-val p-accepted">${acceptRate}</span></div>
          <div class="p-stat"><span>Trend <span class="${trendClass}">${trendArrow}</span></span><span class="p-val">${recent.length} session${recent.length !== 1 ? 's' : ''}</span></div>
        </div>`;
      }
      html += '</div>';
      return html;
    }

    function renderTrendChart(data) {
      const canvas = document.getElementById('trend-chart');
      if (!canvas) return;

      if (trendChartInstance) {
        trendChartInstance.destroy();
        trendChartInstance = null;
      }

      const ctx = canvas.getContext('2d');
      const trends = data.trends || {};
      const personas = data.personas || [];

      const personaKeys = personas.map(p => p.agentType.replace('compound-engineering:', ''));
      const allSessionIds = new Set();
      const sessionDates = {};
      for (const s of data.sessions || []) {
        allSessionIds.add(s.sessionId);
        sessionDates[s.sessionId] = s.startedAt;
      }

      const chronoSessions = (data.sessions || []).slice().reverse();

      const colors = [
        '#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff',
        '#79c0ff', '#56d364', '#e3b341', '#ff7b72', '#d2a8ff',
        '#1f6feb', '#238636', '#9e6a03', '#da3633', '#8957e5',
        '#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff',
        '#79c0ff',
      ];

      const datasets = [];
      let colorIdx = 0;

      for (const pk of personaKeys) {
        const trend = trends[pk] || [];
        if (!trend.length) continue;

        const trendMap = {};
        for (const t of trend) {
          trendMap[t.sessionId] = t.findingCount;
        }

        const dataPoints = [];
        for (const s of chronoSessions) {
          dataPoints.push(trendMap[s.sessionId] !== undefined ? trendMap[s.sessionId] : null);
        }

        const pinfo = personas.find(p => p.agentType.replace('compound-engineering:', '') === pk);
        datasets.push({
          label: pinfo ? pinfo.displayName : pk,
          data: dataPoints,
          borderColor: colors[colorIdx % colors.length],
          backgroundColor: colors[colorIdx % colors.length] + '33',
          tension: 0.2,
          pointRadius: 3,
          spanGaps: false,
        });
        colorIdx++;
      }

      if (!datasets.length) return;

      if (typeof Chart === 'undefined') {
        canvas.parentElement.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px">Chart library unavailable</p>';
        return;
      }

      trendChartInstance = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          scales: {
            x: {
              type: 'category',
              labels: chronoSessions.map(s => fmtDate(s.startedAt)),
              ticks: { color: '#8b949e', maxTicksLimit: 15 },
              grid: { color: '#30363d33' },
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#8b949e', precision: 0 },
              grid: { color: '#30363d33' },
            },
          },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#e6edf3', boxWidth: 12, padding: 16, usePointStyle: true, pointStyle: 'circle' },
              onClick: function(e, legendItem, legend) {
                const index = legendItem.datasetIndex;
                const ci = legend.chart;
                const meta = ci.getDatasetMeta(index);
                meta.hidden = !meta.hidden;
                ci.update();
              },
            },
          },
        },
      });
    }

    function renderBlindSpots(data) {
      const blindSpots = data.blindSpots || [];
      if (!blindSpots.length) {
        return '<div class="blind-spot-clear">No blind spots detected</div>';
      }
      let html = '';
      for (const bs of blindSpots) {
        html += `<div class="blind-spot-item">
          <svg class="bs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <div class="bs-text"><strong>${esc(bs.displayName)}</strong> – ${esc(bs.reason)}</div>
        </div>`;
      }
      return html;
    }

    document.getElementById('refresh-reviews-btn')?.addEventListener('click', () => {
      analyticsData = null;
      if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }
      loadReviews();
    });

    // ── Infinite scroll ──────────────────────────────────────────────
    const sentinel = document.createElement('div');
    sentinel.id = 'scroll-sentinel';
    sentinel.style.cssText = 'height:1px;width:100%';

    const scrollObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !_loading && sessions.length < total) {
        _loading = true;
        offset += PAGE_SIZE;
        fetchPage(false).finally(() => { _loading = false; });
      }
    }, { rootMargin: '200px' });
    scrollObserver.observe(sentinel);

    // ── Scroll to top ────────────────────────────────────────────────
    const scrollTopBtn = document.getElementById('scroll-top-btn');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
    });
    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
